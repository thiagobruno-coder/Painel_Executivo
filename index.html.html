 = 'setor';\nlet curTab  = 'sumario';\nlet fGrupo  = 'all';\nlet fDistrib= 'all';\nlet charts  = {};\n\nconst MO = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nconst fmtN  = v => Math.round(+v).toLocaleString('pt-BR');\nconst fmtPct = v => (+v*100).toFixed(2)+'%';\nconst r4    = v => Math.round(+v*1000000)/1000000;\n\nconst ENERGISA_COLOR = '#C2CD23';\nconst SETOR_COLOR    = '#3984A3';\nconst ENERGISA_SIGLAS = new Set(['EAC','EMR','EMS','EMT','EPB','ERO','ESE','ESS','ETO']);\n\nfunction tag(cls,txt){return `<span class=\"tag ${cls}\">${txt}</span>`;}\n// For \"less is better\" indicators: decrease \u2192 green (tag-dn), increase \u2192 red (tag-up)\n// Symbol: decrease shows \"\u2212X%\", increase shows \"+X%\"\nfunction momTag(v,goodDir='down'){\n  const up=v>0, isBad=goodDir==='down'?up:!up;\n  const symbol=up?'+':'\\u2212';\n  return tag(isBad?'tag-up':'tag-dn', symbol+Math.abs(v).toFixed(2)+'% MoM');\n}\nfunction yoyTag(v,goodDir='down'){\n  const up=v>0, isBad=goodDir==='down'?up:!up;\n  const symbol=up?'+':'\\u2212';\n  return tag(isBad?'tag-up':'tag-dn', symbol+Math.abs(v).toFixed(2)+'% YoY');\n}\nfunction kill(id){if(charts[id]){charts[id].destroy();delete charts[id];}}\nfunction getD(){return scope==='energisa'?DE:DS;}\n\nfunction applyFilters(arr){\n  return arr.filter(r=>{\n    const okG=fGrupo==='all'||r.GrupoEconomico===fGrupo;\n    const okD=fDistrib==='all'||r.Sigla===fDistrib;\n    return okG&&okD;\n  });\n}\n\n// Returns the active monthly series considering active filters.\n// Priority: distribuidora filter > grupo filter > full dataset\nfunction getActiveMonthly(){\n  const D = getD();\n  // Single distribuidora selected\n  if(fDistrib!=='all' && DIST_HISTORY[fDistrib]){\n    const hist = DIST_HISTORY[fDistrib];\n    return hist.slice(-24);\n  }\n  // Grupo filter: sum monthly series of all distribuidoras in grupo\n  if(fGrupo!=='all'){\n    const siglasInGrupo = D.classification\n      .filter(r=>r.GrupoEconomico===fGrupo)\n      .map(r=>r.Sigla);\n    if(siglasInGrupo.length===0) return D.monthly;\n    // Collect all date_str in order\n    const allDates = [];\n    const seen = new Set();\n    siglasInGrupo.forEach(s=>{\n      (DIST_HISTORY[s]||[]).forEach(m=>{if(!seen.has(m.date_str)){seen.add(m.date_str);allDates.push(m.date_str);}});\n    });\n    allDates.sort((a,b)=>{\n      const [ma,ya]=a.split('/'), [mb,yb]=b.split('/');\n      const MO2=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n      return (+ya*12+MO2.indexOf(ma))-(+yb*12+MO2.indexOf(mb));\n    });\n    const byDate={};\n    allDates.forEach(d=>byDate[d]={date_str:d,QSLnM:0,QSLn12M:0,PSL_M:0,PSL12M:0,PRF_M:0,PRF12M:0,PCF_M:0,PCF12M:0,cnt:0});\n    siglasInGrupo.forEach(s=>{\n      (DIST_HISTORY[s]||[]).forEach(m=>{\n        const b=byDate[m.date_str];\n        if(!b) return;\n        b.QSLnM+=m.QSLnM; b.QSLn12M+=m.QSLn12M;\n        b.PSL_M+=m.PSL_M; b.PSL12M+=m.PSL12M;\n        b.PRF_M+=m.PRF_M; b.PRF12M+=m.PRF12M;\n        b.PCF_M+=m.PCF_M; b.PCF12M+=m.PCF12M;\n        b.cnt++;\n      });\n    });\n    const merged = allDates.map(d=>byDate[d]);\n    return merged.slice(-24);\n  }\n  return D.monthly;\n}\n\nfunction getActiveFc(key){\n  // If a specific distribuidora is selected, compute forecast from its history\n  if(fDistrib!=='all' && DIST_HISTORY[fDistrib]){\n    const hist = DIST_HISTORY[fDistrib];\n    const yArr = hist.map(m=>m[key]);\n    const lastDs = hist[hist.length-1].date_str;\n    return etsFc(yArr, 6, 12, lastDs);\n  }\n  // If grupo is selected, compute from merged grupo history\n  if(fGrupo!=='all'){\n    const m = getActiveMonthly();\n    if(m.length<2) return getFc(getD(),key);\n    const lastDs = m[m.length-1].date_str;\n    return etsFc(m.map(r=>r[key]), 6, 12, lastDs);\n  }\n  return getFc(getD(), key);\n}\n\nfunction pChange(a,b){return b?Math.round((a-b)/Math.abs(b)*10000)/100:0;}\n\nfunction kpisFromMonthly(m){\n  if(!m||!m.length)return null;\n  const n=m.length,last=m[n-1],prev=m[n-2]||m[n-1],yoy=m[n-13]||prev;\n  function k(key){return{val:last[key],mom:pChange(last[key],prev[key]),yoy:pChange(last[key],yoy[key])};}\n  return{last_month:last.date_str,\n    QSLnM:k('QSLnM'),QSLn12M:k('QSLn12M'),\n    PSL_M:k('PSL_M'),PSL12M:k('PSL12M'),\n    PRF_M:k('PRF_M'),PRF12M:k('PRF12M'),\n    PCF_M:k('PCF_M'),PCF12M:k('PCF12M')};\n}\n\n// ETS forecast\nfunction etsFc(yArr,n,sp,lastDateStr){\n  const y=yArr.map(v=>+v),N=y.length;\n  let sx=0,sy=0,sxy=0,sx2=0;\n  for(let i=0;i<N;i++){sx+=i;sy+=y[i];sxy+=i*y[i];sx2+=i*i;}\n  const D2=N*sx2-sx*sx,slope=D2?(N*sxy-sx*sy)/D2:0,ic=(sy-slope*sx)/N;\n  const det=y.map((v,i)=>v-(slope*i+ic));\n  const seas=Array.from({length:sp},(_,s)=>{const v=[];for(let j=s;j<N;j+=sp)v.push(det[j]);return v.length?v.reduce((a,b)=>a+b)/v.length:0;});\n  let lv=y[0];for(let t=1;t<N;t++)lv=0.4*(y[t]-seas[t%sp])+0.6*(lv+slope);\n  const ft=y.map((v,i)=>slope*i+ic+seas[i%sp]);\n  const rmse=Math.sqrt(y.reduce((s,v,i)=>s+(v-ft[i])**2,0)/N);\n  const parts=(lastDateStr||'').split('/');\n  const mo=MO.indexOf(parts[0]??''),yr=parseInt(parts[1]??'2026');\n  return Array.from({length:n},(_,h)=>{\n    const fc=lv+(h+1)*slope+seas[(N+h)%sp];\n    const lo=fc-1.645*rmse*(h+1)**0.5,hi=fc+1.645*rmse*(h+1)**0.5;\n    let m2=mo+h+2,y2=yr;while(m2>12){m2-=12;y2++;}\n    return{date_str:MO[m2-1]+'/'+y2,Forecast:r4(fc),Lower:r4(lo),Upper:r4(hi)};\n  });\n}\n\nfunction getFc(D,key){\n  const fcMap={QSLnM:'fc_qslnm',QSLn12M:'fc_qsln12m',PSL_M:'fc_pslm',PSL12M:'fc_psl12m',\n               PRF_M:'fc_prfm',PRF12M:'fc_prf12m',PCF_M:'fc_pcfm',PCF12M:'fc_pcf12m'};\n  return D[fcMap[key]];\n}\n\n// SCOPE\nfunction setScope(s,btn){\n  scope=s;\n  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  const D=getD();\n  const lbl=s==='setor'?'Setor El\u00e9trico':'Grupo Energisa';\n  document.getElementById('refPeriod').textContent='\ud83d\udcca '+D.kpis.last_month;\n  document.getElementById('footerL').textContent='Relat\u00f3rio Executivo \u00b7 Performance de Faturamento \u00b7 '+lbl;\n  ['sum-scope-lbl','fc-scope-lbl','dist-scope-lbl','ins-scope-lbl'].forEach(id=>{\n    const el=document.getElementById(id);if(el)el.textContent=lbl;\n  });\n  populateFilters();\n  updateScopeInfo();\n  renderAll();\n}\n\n// TABS\nfunction showTab(tab,el){\n  curTab=tab;\n  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));\n  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));\n  document.getElementById('tab-'+tab).classList.add('active');\n  el.classList.add('active');\n  setTimeout(()=>renderTab(tab),50);\n}\nfunction renderAll(){Object.keys(charts).forEach(kill);renderTab(curTab);}\nfunction renderTab(t){\n  if(t==='sumario')       renderSumario();\n  if(t==='forecast')      renderForecast();\n  if(t==='distribuidoras')renderDistribuidoras();\n  if(t==='insights')      renderInsights();\n}\n\n// FILTERS\nfunction populateFilters(){\n  const D=getD();\n  const grupos=[...new Set(D.classification.map(r=>r.GrupoEconomico).filter(Boolean))].sort();\n  const selGE=document.getElementById('selGE'),selD=document.getElementById('selD');\n  selGE.innerHTML='<option value=\"all\">Todos os grupos</option>'+\n    grupos.map(g=>`<option value=\"${g}\"${g===fGrupo?' selected':''}>${g}</option>`).join('');\n  const distribs=[...new Set(\n    D.classification.filter(r=>fGrupo==='all'||r.GrupoEconomico===fGrupo).map(r=>r.Sigla)\n  )].sort();\n  selD.innerHTML='<option value=\"all\">Todas as distribuidoras</option>'+\n    distribs.map(d=>`<option value=\"${d}\"${d===fDistrib?' selected':''}>${d}</option>`).join('');\n  updateBadge();\n}\nfunction onFilterChange(event){\n  const selGE=document.getElementById('selGE'),selD=document.getElementById('selD');\n  fGrupo=selGE.value;\n  if(event&&event.target===selGE){\n    const D=getD();\n    const distribs=[...new Set(\n      D.classification.filter(r=>fGrupo==='all'||r.GrupoEconomico===fGrupo).map(r=>r.Sigla)\n    )].sort();\n    selD.innerHTML='<option value=\"all\">Todas as distribuidoras</option>'+\n      distribs.map(d=>`<option value=\"${d}\">${d}</option>`).join('');\n    fDistrib='all';\n  } else {fDistrib=selD.value;}\n  selGE.className='seg-select'+(fGrupo!=='all'?' filtered':'');\n  selD.className='seg-select'+(fDistrib!=='all'?' filtered':'');\n  updateBadge();updateScopeInfo();renderAll();\n}\nfunction clearFilters(){\n  fGrupo='all';fDistrib='all';\n  document.getElementById('selGE').value='all';\n  document.getElementById('selD').value='all';\n  document.getElementById('selGE').className='seg-select';\n  document.getElementById('selD').className='seg-select';\n  populateFilters();updateBadge();updateScopeInfo();renderAll();\n}\nfunction updateScopeInfo(){\n  const D=getD();\n  const lbl=scope==='setor'?'Setor El\u00e9trico':'Grupo Energisa';\n  let info=lbl+' \u00b7 '+D.n_distribs+' distribuidoras';\n  if(fDistrib!=='all') info=lbl+' \u00b7 '+fDistrib;\n  else if(fGrupo!=='all') info=lbl+' \u00b7 '+fGrupo;\n  document.getElementById('scopeInfo').textContent=info;\n}\nfunction updateBadge(){\n  const b=document.getElementById('segBadge');\n  const parts=[];\n  if(fGrupo!=='all')parts.push('Grupo: '+fGrupo);\n  if(fDistrib!=='all')parts.push('Distribuidora: '+fDistrib);\n  b.textContent=parts.length?'\ud83d\udd0d '+parts.join(' \u00b7 '):'';\n  b.style.display=parts.length?'inline-flex':'none';\n}\n\n// RENDER SUM\u00c1RIO\nfunction renderSumario(){\n  const D=getD();\n  const m=getActiveMonthly();\n  const k=kpisFromMonthly(m)||D.kpis;\n  Chart.defaults.color='#7a95a5';Chart.defaults.borderColor='#d8e4ea';Chart.defaults.font.family='DM Sans';\n\n  // Monthly KPIs\n  document.getElementById('kpiGridM').innerHTML=[\n    {l:'QSLnc-M \u2014 Faturas sem Leitura', v:fmtN(k.QSLnM.val), t:momTag(k.QSLnM.mom)+yoyTag(k.QSLnM.yoy), c:'c0'},\n    {l:'PSL-M \u2014 % Fat. sem Leitura',    v:(+k.PSL_M.val*100).toFixed(2)+'%', t:momTag(k.PSL_M.mom)+yoyTag(k.PSL_M.yoy), c:'c1'},\n    {l:'PRF-M \u2014 % Refaturamento',       v:(+k.PRF_M.val*100).toFixed(2)+'%', t:momTag(k.PRF_M.mom)+yoyTag(k.PRF_M.yoy), c:'c2'},\n    {l:'PCF-M \u2014 % Acertos Refat.',      v:(+k.PCF_M.val*100).toFixed(2)+'%', t:momTag(k.PCF_M.mom)+yoyTag(k.PCF_M.yoy), c:'c3'},\n  ].map(x=>`<div class=\"kpi-card ${x.c}\"><div class=\"klbl\">${x.l}</div><div class=\"kval\">${x.v}</div><div class=\"ktags\">${x.t}</div></div>`).join('');\n\n  // 12M KPIs\n  document.getElementById('kpiGrid12M').innerHTML=[\n    {l:'QSLnc-12M \u2014 Fat. sem Leitura 12M', v:fmtN(k.QSLn12M.val), t:momTag(k.QSLn12M.mom)+yoyTag(k.QSLn12M.yoy), c:'c0'},\n    {l:'PSL-12M \u2014 % Fat. sem Leitura 12M', v:(+k.PSL12M.val*100).toFixed(2)+'%', t:momTag(k.PSL12M.mom)+yoyTag(k.PSL12M.yoy), c:'c1'},\n    {l:'PRF-12M \u2014 % Refaturamento 12M',    v:(+k.PRF12M.val*100).toFixed(2)+'%', t:momTag(k.PRF12M.mom)+yoyTag(k.PRF12M.yoy), c:'c2'},\n    {l:'PCF-12M \u2014 % Acertos Refat. 12M',   v:(+k.PCF12M.val*100).toFixed(2)+'%', t:momTag(k.PCF12M.mom)+yoyTag(k.PCF12M.yoy), c:'c3'},\n  ].map(x=>`<div class=\"kpi-card ${x.c}\"><div class=\"klbl\">${x.l}</div><div class=\"kval\">${x.v}</div><div class=\"ktags\">${x.t}</div></div>`).join('');\n\n  const labels=m.map(d=>d.date_str);\n  const mkLine=(id,data,color,label,isPercent)=>{\n    kill(id);\n    const vals=data.map(v=>isPercent?+(v*100).toFixed(4):v);\n    charts[id]=new Chart(document.getElementById(id),{type:'line',\n      data:{labels,datasets:[{label,data:vals,borderColor:color,backgroundColor:color+'18',tension:.3,borderWidth:2.5,pointRadius:2,fill:true}]},\n      options:{responsive:true,plugins:{legend:{display:false}},\n        scales:{y:{grid:{color:'#d8e4ea'},ticks:{callback:v=>isPercent?v.toFixed(2)+'%':v.toLocaleString('pt-BR')}}}}});\n  };\n  const mkLine2=(id,d1,d2,c1,c2,l1,l2,isPercent)=>{\n    kill(id);\n    const v1=d1.map(v=>isPercent?+(v*100).toFixed(4):v);\n    const v2=d2.map(v=>isPercent?+(v*100).toFixed(4):v);\n    charts[id]=new Chart(document.getElementById(id),{type:'line',\n      data:{labels,datasets:[\n        {label:l1,data:v1,borderColor:c1,backgroundColor:c1+'18',tension:.3,borderWidth:2.5,pointRadius:2,fill:true},\n        {label:l2,data:v2,borderColor:c2,tension:.3,borderWidth:1.5,pointRadius:2,borderDash:[5,3],fill:false},\n      ]},\n      options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},\n        scales:{y:{grid:{color:'#d8e4ea'},ticks:{callback:v=>isPercent?v.toFixed(2)+'%':v.toLocaleString('pt-BR')}}}}});\n  };\n\n  // QSLnc separated\n  mkLine('cQSLnM',  m.map(d=>d.QSLnM),  '#009FC2','QSLnc-M', false);\n  mkLine('cQSLn12M',m.map(d=>d.QSLn12M),'#314D5A','QSLnc-12M',false);\n  // PSL separated\n  mkLine('cPSLM',   m.map(d=>d.PSL_M),  '#ED1C24','PSL-M',   true);\n  mkLine('cPSL12M', m.map(d=>d.PSL12M), '#c47a00','PSL-12M', true);\n  // PRF separated\n  mkLine('cPRFM',   m.map(d=>d.PRF_M),  '#F99C1C','PRF-M',  true);\n  mkLine('cPRF12M', m.map(d=>d.PRF12M), '#c47a00','PRF-12M',true);\n  // PCF separated\n  mkLine('cPCFM',   m.map(d=>d.PCF_M),  '#70BF54','PCF-M',  true);\n  mkLine('cPCF12M', m.map(d=>d.PCF12M), '#3984A3','PCF-12M',true);\n}\n\n// RENDER FORECAST\nfunction renderForecast(){\n  const D=getD();\n  const m=getActiveMonthly();\n  document.getElementById('fc-tbl-sub').textContent=D.label+(fDistrib!=='all'?' \u00b7 '+fDistrib:fGrupo!=='all'?' \u00b7 '+fGrupo:'')+' \u00b7 Indicadores Mensais';\n\n  function mkFcChart(id,key,color,isPercent){\n    kill(id);\n    const fcData=getActiveFc(key);\n    if(!fcData||!fcData.length)return;\n    const hL=m.map(d=>d.date_str);\n    const mult=isPercent?100:1;\n    const hV=m.map(d=>+(d[key]*mult).toFixed(4));\n    const fL=fcData.map(d=>d.date_str);\n    const allL=[...hL,...fL];\n    const fcLine=[...Array(hL.length).fill(null),...fcData.map(d=>+(d.Forecast*mult).toFixed(4))];\n    if(hL.length)fcLine[hL.length-1]=hV[hV.length-1];\n    const fcUp=[...Array(hL.length).fill(null),...fcData.map(d=>+(d.Upper*mult).toFixed(4))];\n    const fcLo=[...Array(hL.length).fill(null),...fcData.map(d=>+(d.Lower*mult).toFixed(4))];\n    charts[id]=new Chart(document.getElementById(id),{type:'line',\n      data:{labels:allL,datasets:[\n        {label:'Hist\u00f3rico',data:[...hV,...Array(fL.length).fill(null)],borderColor:color,tension:.3,borderWidth:2,pointRadius:1.5,fill:false},\n        {label:'Proje\u00e7\u00e3o', data:fcLine,borderColor:color,borderWidth:2,borderDash:[6,3],tension:.3,pointRadius:3,fill:false},\n        {label:'IC Sup',   data:fcUp,borderColor:color+'44',borderWidth:1,borderDash:[2,2],pointRadius:0,fill:'+1',backgroundColor:color+'18'},\n        {label:'IC Inf',   data:fcLo,borderColor:color+'44',borderWidth:1,borderDash:[2,2],pointRadius:0,fill:false},\n      ]},\n      options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:8,font:{size:10},filter:i=>i.datasetIndex<2}}},\n        scales:{y:{grid:{color:'#d8e4ea'},ticks:{callback:v=>isPercent?v.toFixed(2)+'%':v.toLocaleString('pt-BR')}}}}});\n  }\n\n  mkFcChart('fcQSLnM', 'QSLnM', '#009FC2',false);\n  mkFcChart('fcQSLn12M','QSLn12M','#314D5A',false);\n  mkFcChart('fcPSLM',  'PSL_M', '#ED1C24',true);\n  mkFcChart('fcPSL12M','PSL12M','#c47a00',true);\n  mkFcChart('fcPRFM',  'PRF_M', '#F99C1C',true);\n  mkFcChart('fcPCFM',  'PCF_M', '#70BF54',true);\n\n  const fcQ=getActiveFc('QSLnM'),fcP=getActiveFc('PSL_M'),fcPR=getActiveFc('PRF_M'),fcPC=getActiveFc('PCF_M');\n  if(!fcQ)return;\n  const tb=document.getElementById('fcTbl');tb.innerHTML='';\n  fcQ.forEach((r,i)=>{\n    const p=fcP[i],pr=fcPR[i],pc=fcPC[i];\n    tb.innerHTML+=`<tr>\n      <td style=\"font-weight:600;color:var(--turquesa)\">${r.date_str}</td>\n      <td>${Math.round(r.Forecast).toLocaleString('pt-BR')}</td>\n      <td style=\"color:var(--text-muted)\">[${Math.round(r.Lower).toLocaleString('pt-BR')} \u2013 ${Math.round(r.Upper).toLocaleString('pt-BR')}]</td>\n      <td>${(p.Forecast*100).toFixed(2)}%</td>\n      <td style=\"color:var(--text-muted)\">[${(p.Lower*100).toFixed(2)}% \u2013 ${(p.Upper*100).toFixed(2)}%]</td>\n      <td>${(pr.Forecast*100).toFixed(2)}%</td>\n      <td style=\"color:var(--text-muted)\">[${(pr.Lower*100).toFixed(2)}% \u2013 ${(pr.Upper*100).toFixed(2)}%]</td>\n      <td>${(pc.Forecast*100).toFixed(2)}%</td>\n      <td style=\"color:var(--text-muted)\">[${(pc.Lower*100).toFixed(2)}% \u2013 ${(pc.Upper*100).toFixed(2)}%]</td>\n    </tr>`;\n  });\n}\n\n// RENDER DISTRIBUIDORAS\nfunction renderDistribuidoras(){\n  const D=getD();\n  // Sort worst\u2192best by QSLnM descending\n  const cls=[...applyFilters(D.classification)].sort((a,b)=>b.QSLnM-a.QSLnM);\n  const top15q=cls.slice(0,15);\n  const top15psl=[...applyFilters(D.classification)].sort((a,b)=>b.PSL_M-a.PSL_M).slice(0,15);\n\n  const getBarColor=r=>r.isEnergisa?ENERGISA_COLOR:SETOR_COLOR;\n\n  kill('cDistPSL');\n  charts['cDistPSL']=new Chart(document.getElementById('cDistPSL'),{type:'bar',\n    data:{labels:top15psl.map(d=>d.Sigla),datasets:[{label:'PSL-M (%)',\n      data:top15psl.map(d=>+(d.PSL_M*100).toFixed(2)),\n      backgroundColor:top15psl.map(r=>getBarColor(r)),\n      borderColor:top15psl.map(r=>getBarColor(r)),\n      borderWidth:1.5,borderRadius:4}]},\n    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},\n      tooltip:{callbacks:{label:c=>{const r=top15psl[c.dataIndex];return ` PSL-M: ${(r.PSL_M*100).toFixed(2)}% \u00b7 QSLnc-M: ${r.QSLnM.toLocaleString('pt-BR')}`;}}\n    }},scales:{x:{grid:{color:'#d8e4ea'},ticks:{callback:v=>v.toFixed(2)+'%'}}}}});\n\n  kill('cDistQSLn');\n  charts['cDistQSLn']=new Chart(document.getElementById('cDistQSLn'),{type:'bar',\n    data:{labels:top15q.map(d=>d.Sigla),datasets:[{label:'QSLnc-M',\n      data:top15q.map(d=>d.QSLnM),\n      backgroundColor:top15q.map(r=>getBarColor(r)),\n      borderColor:top15q.map(r=>getBarColor(r)),\n      borderWidth:1.5,borderRadius:4}]},\n    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},\n      tooltip:{callbacks:{label:c=>{const r=top15q[c.dataIndex];return ` QSLnc-M: ${r.QSLnM.toLocaleString('pt-BR')} \u00b7 PSL-M: ${(r.PSL_M*100).toFixed(2)}%`;}}}\n    },scales:{x:{grid:{color:'#d8e4ea'},ticks:{callback:v=>v.toLocaleString('pt-BR')}}}}});\n\n  // Table sorted worst\u2192best by QSLnM\n  const tb=document.getElementById('distTbl');tb.innerHTML='';\n  cls.forEach((r,i)=>{\n    const dotColor=r.isEnergisa?ENERGISA_COLOR:SETOR_COLOR;\n    const pslW=Math.min(r.PSL_M*100,100);\n    tb.innerHTML+=`<tr>\n      <td style=\"color:var(--text-muted);font-weight:600\">${i+1}</td>\n      <td style=\"font-weight:600\"><span style=\"display:inline-block;width:8px;height:8px;border-radius:2px;background:${dotColor};margin-right:6px;vertical-align:middle;\"></span>${r.Sigla}</td>\n      <td style=\"color:var(--text-muted)\">${r.GrupoEconomico}</td>\n      <td style=\"font-weight:700;color:${r.QSLnM>50000?'var(--vermelho)':r.QSLnM>10000?'#c47a00':'var(--text)'}\">${r.QSLnM.toLocaleString('pt-BR')}</td>\n      <td>${r.QSLn12M.toLocaleString('pt-BR')}</td>\n      <td><div class=\"pbar\"><div class=\"pb-bg\"><div class=\"pb-fill\" style=\"width:${pslW}%;background:${dotColor}\"></div></div>\n        <span style=\"color:${dotColor};font-weight:700;min-width:55px;text-align:right\">${(r.PSL_M*100).toFixed(2)}%</span></div></td>\n      <td style=\"color:var(--text-muted)\">${(r.PSL12M*100).toFixed(2)}%</td>\n      <td>${(r.PRF_M*100).toFixed(2)}%</td>\n      <td style=\"color:var(--text-muted)\">${(r.PRF12M*100).toFixed(2)}%</td>\n      <td style=\"font-weight:600\">${(r.PCF_M*100).toFixed(2)}%</td>\n      <td style=\"color:var(--text-muted)\">${(r.PCF12M*100).toFixed(2)}%</td>\n    </tr>`;\n  });\n}\n\n// INSIGHTS\nfunction renderInsights(){\n  const D=getD(); const k=D.kpis; const isE=scope==='energisa';\n  const pslM=(+k.PSL_M.val*100).toFixed(2);\n  const prfM=(+k.PRF_M.val*100).toFixed(2);\n  const pcfM=(+k.PCF_M.val*100).toFixed(2);\n  let cards=[];\n  if(isE) cards=[\n    {i:'\ud83d\udcca',c:'ib',t:'Grupo Energisa \u2014 Vis\u00e3o Geral de Fev/2026',\n     b:`O Grupo Energisa registrou <span class=\"yt\">${fmtN(k.QSLnM.val)} faturas sem leitura</span> (QSLnc-M) em fev/2026, com varia\u00e7\u00e3o de <strong>${k.QSLnM.mom>0?'+':''}${k.QSLnM.mom}% MoM</strong> e <strong>${k.QSLnM.yoy>0?'+':''}${k.QSLnM.yoy}% YoY</strong>. PSL-M de <span class=\"yt\">${pslM}%</span>.`},\n    {i:'\ud83d\udcc8',c:'iy',t:`PSL-M em ${pslM}% \u2014 Varia\u00e7\u00e3o ${k.PSL_M.mom>0?'+':''}${k.PSL_M.mom}% MoM`,\n     b:`O percentual de faturamento sem leitura mensal est\u00e1 em <span class=\"yt\">${pslM}%</span>. No acumulado 12M o PSL-12M \u00e9 de <strong>${(+k.PSL12M.val*100).toFixed(2)}%</strong> (${k.PSL12M.mom>0?'+':''}${k.PSL12M.mom}% MoM). EMT, EAC e EPB concentram os maiores volumes absolutos de QSLnc-M no grupo.`},\n    {i:'\ud83d\udd04',c:'ib',t:`PRF-M de ${prfM}% \u2014 Controle de Refaturamento`,\n     b:`O percentual de refaturamento mensal \u00e9 de <span class=\"bt\">${prfM}%</span> (${k.PRF_M.mom>0?'+':''}${k.PRF_M.mom}% MoM, ${k.PRF_M.yoy>0?'+':''}${k.PRF_M.yoy}% YoY). PRF-12M em ${(+k.PRF12M.val*100).toFixed(2)}%. Manuten\u00e7\u00e3o de PRF baixo \u00e9 indicativo de qualidade operacional do processo de faturamento.`},\n    {i:'\u2705',c:'ig2',t:`PCF-M de ${pcfM}% \u2014 Efic\u00e1cia nos Acertos`,\n     b:`PCF-M de <span class=\"gt\">${pcfM}%</span> (${k.PCF_M.mom>0?'+':''}${k.PCF_M.mom}% MoM). PCF-12M em ${(+k.PCF12M.val*100).toFixed(2)}%. Monitorar tend\u00eancia: acertos elevados indicam efici\u00eancia no processo de corre\u00e7\u00e3o, mas tamb\u00e9m podem refletir volume ainda representativo de refaturamentos.`},\n    {i:'\ud83d\udcc9',c:'ig2',t:`QSLnc-12M em ${fmtN(k.QSLn12M.val)} \u2014 Tend\u00eancia Acumulada`,\n     b:`Base acumulada de <strong>${fmtN(k.QSLn12M.val)} faturas sem leitura</strong> nos \u00faltimos 12M (${k.QSLn12M.mom>0?'+':''}${k.QSLn12M.mom}% MoM \u00b7 ${k.QSLn12M.yoy>0?'+':''}${k.QSLn12M.yoy}% YoY). Comparado ao setor (${fmtN(DS.kpis.QSLn12M.val)}), o grupo representa ${Math.round(+k.QSLn12M.val/+DS.kpis.QSLn12M.val*100)}% do acumulado setorial.`},\n    {i:'\ud83c\udfaf',c:'ib',t:'Recomenda\u00e7\u00f5es para o Grupo Energisa',\n     b:`<strong>1.</strong> Priorizar redu\u00e7\u00e3o de QSLnc-M nas distribuidoras de maior volume (EMT, EAC, EPB).<br><strong>2.</strong> Implementar cronogramas de leitura em campo para substituir estimativas sistem\u00e1ticas.<br><strong>3.</strong> Monitorar PSL-12M \u2014 indicador anualizado ainda acima de valores ideais.<br><strong>4.</strong> Manter PRF-M abaixo de 0,5% como meta operacional.<br><strong>5.</strong> Compartilhar pr\u00e1ticas de distribuidoras com menores PSL-M (ERO, ESE) com as demais unidades.`,f:true},\n  ];\n  else cards=[\n    {i:'\ud83d\udea8',c:'ir',t:`QSLnc-M Atinge ${fmtN(k.QSLnM.val)} em Fev/2026 \u2014 ${k.QSLnM.mom>0?'+':''}${k.QSLnM.mom}% MoM`,\n     b:`O setor registrou <span class=\"rt\">${fmtN(k.QSLnM.val)} faturas emitidas sem leitura</span> em fev/2026. Varia\u00e7\u00e3o de <strong>${k.QSLnM.mom>0?'+':''}${k.QSLnM.mom}% MoM</strong> e <strong>${k.QSLnM.yoy>0?'+':''}${k.QSLnM.yoy}% YoY</strong>. ENEL, ENERGISA, LIGHT e OLIVEIRA ENERGIA concentram os maiores volumes absolutos.`},\n    {i:'\ud83d\udcc8',c:'iy',t:`PSL-M Setorial em ${pslM}% \u2014 Varia\u00e7\u00e3o ${k.PSL_M.mom>0?'+':''}${k.PSL_M.mom}% MoM`,\n     b:`Percentual de faturamento sem leitura em <span class=\"yt\">${pslM}%</span>, com queda de ${Math.abs(k.PSL_M.mom)}% MoM mas alta de ${k.PSL_M.yoy}% YoY. O PSL-12M de ${(+k.PSL12M.val*100).toFixed(2)}% indica que a tend\u00eancia anualizada ainda n\u00e3o reflete melhora estrutural consistente.`},\n    {i:'\u26a0\ufe0f',c:'iy',t:'EQTL PA, ENEL CE e COCEL Lideram PSL-M Acima de 7%',\n     b:`Os maiores PSL-M percentuais pertencem a EQTL PA (11,77%), ENEL CE (11,45%), COCEL (7,92%) e ELTROCAR (8,20%). Essas distribuidoras demandam planos espec\u00edficos de regulariza\u00e7\u00e3o de leitura em campo.`},\n    {i:'\u2705',c:'ig2',t:`PRF-M Setorial em ${prfM}% \u2014 Queda ${k.PRF_M.mom}% MoM`,\n     b:`O PRF-M de <span class=\"gt\">${prfM}%</span> representa queda de ${Math.abs(k.PRF_M.mom)}% MoM e ${Math.abs(k.PRF_M.yoy)}% YoY. A redu\u00e7\u00e3o consistente no refaturamento \u00e9 positiva e indica melhora na qualidade dos dados de faturamento emitidos.`},\n    {i:'\ud83d\udcca',c:'ib',t:`PCF-M em ${pcfM}% \u2014 Acertos ${k.PCF_M.mom>0?'em Alta':'em Queda'} ${k.PCF_M.mom>0?'+':''}${k.PCF_M.mom}% MoM`,\n     b:`PCF-M de <span class=\"bt\">${pcfM}%</span>. Aumento nos acertos de refaturamento pode indicar efici\u00eancia crescente no processo corretivo. PCF-12M de ${(+k.PCF12M.val*100).toFixed(2)}% (${k.PCF12M.yoy>0?'+':''}${k.PCF12M.yoy}% YoY).`},\n    {i:'\ud83c\udfaf',c:'ib',t:'Recomenda\u00e7\u00f5es Estrat\u00e9gicas para o Setor',\n     b:`<strong>1.</strong> Interven\u00e7\u00e3o priorit\u00e1ria em EQTL PA, ENEL CE e ELTROCAR (PSL-M >8%).<br><strong>2.</strong> Meta setorial: PSL-M \u2264 3,0% at\u00e9 dez/2026.<br><strong>3.</strong> Benchmarking com distribuidoras de melhor desempenho (DEMEI, EFLJC, MUX ENERGIA \u2014 QSLnc-M \u2248 0).<br><strong>4.</strong> Acompanhar sazonalidade do QSLnc-M \u2014 picos em jan/fev podem refletir f\u00e9rias de equipes de campo.<br><strong>5.</strong> Monitorar queda do PRF-M para confirmar tend\u00eancia estrutural de melhora.`,f:true},\n  ];\n  document.getElementById('insContainer').innerHTML=cards.map(c=>\n    `<div class=\"ic${c.f?' full':''}\"><div class=\"ico ${c.c}\">${c.i}</div><h3>${c.t}</h3><p>${c.b}</p></div>`\n  ).join('');\n}\n\n// PRINT\nfunction printReport(){\n  document.querySelectorAll('.section').forEach(s=>s.classList.add('active'));\n  setTimeout(()=>{\n    window.print();\n    setTimeout(()=>{\n      document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));\n      document.getElementById('tab-'+curTab).classList.add('active');\n    },500);\n  },300);\n}\n\n// FILE UPLOAD \u2014 3 arquivos\nconst pendingFiles = {setor: null, grupo: null, dist: null};\n\nfunction onFileSelected(key, input){\n  const file = input.files[0];\n  if(!file) return;\n  pendingFiles[key] = file;\n  const lblMap = {setor:'lblSetor', grupo:'lblGrupo', dist:'lblDist'};\n  const stMap  = {setor:'stSetor',  grupo:'stGrupo',  dist:'stDist'};\n  document.getElementById(lblMap[key]).textContent = '\u2705 '+file.name;\n  document.getElementById(lblMap[key]).style.borderColor = 'var(--verde-med)';\n  document.getElementById(lblMap[key]).style.color = 'var(--verde-med)';\n  document.getElementById(stMap[key]).textContent = 'Selecionado';\n  document.getElementById(stMap[key]).style.color = 'var(--verde-med)';\n  // Enable button as soon as at least 1 file is chosen; all 3 required to process\n  const anySelected = Object.values(pendingFiles).some(f=>f!==null);\n  document.getElementById('upBtn').disabled = !anySelected;\n}\n\nfunction setStat(msg,cls){\n  const el=document.getElementById('upStat');\n  el.textContent=msg;\n  el.className='upstat'+(cls?' '+cls:'');\n}\n\n// Read a file as ArrayBuffer \u2192 Promise\nfunction readFileAsync(file){\n  return new Promise((resolve, reject)=>{\n    const r = new FileReader();\n    r.onerror = ()=>reject(new Error('Erro ao ler: '+file.name));\n    r.onload  = e=>resolve(e.target.result);\n    r.readAsArrayBuffer(file);\n  });\n}\n\n// Parse xlsx ArrayBuffer \u2192 array of row objects (only rows with valid DataRef)\nfunction parseXlsx(buf){\n  const wb  = XLSX.read(new Uint8Array(buf), {type:'array', cellDates:true});\n  const ws  = wb.Sheets[wb.SheetNames[0]];\n  const raw = XLSX.utils.sheet_to_json(ws, {raw:true, defval:null});\n  return raw;\n}\n\nasync function processFiles(){\n  const hasSetor = !!pendingFiles.setor;\n  const hasGrupo = !!pendingFiles.grupo;\n  const hasDist  = !!pendingFiles.dist;\n\n  if(!hasSetor && !hasGrupo && !hasDist){\n    setStat('\u26a0\ufe0f Selecione ao menos um arquivo.','err'); return;\n  }\n\n  const btn = document.getElementById('upBtn');\n  btn.disabled=true; btn.textContent='Processando...';\n  setStat('\u23f3 Lendo arquivos...','loading');\n\n  const MO2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n  const ESIG = new Set(['EAC','EMR','EMS','EMT','EPB','ERO','ESE','ESS','ETO']);\n\n  function r6l(v){ try{const f=parseFloat(v);return isNaN(f)?0:Math.round(f*1000000)/1000000;}catch{return 0;} }\n  function si(v){ return Math.round(r6l(v)); }\n  function ds3(dt){ return MO2[dt.getMonth()]+'/'+dt.getFullYear(); }\n  function parseDt(rd){\n    if(rd instanceof Date && !isNaN(rd)) return rd;\n    if(typeof rd==='number') return new Date(Math.round((rd-25569)*86400000));\n    if(typeof rd==='string'){ const d=new Date(rd.trim()); if(!isNaN(d)) return d; }\n    return null;\n  }\n  function validRows(raw){ return raw.filter(r=>{ const dt=parseDt(r['DataRef']); return dt&&!isNaN(dt.getTime()); }); }\n\n  function etsFc3(yArr,n,sp,lastDt){\n    const y=yArr.map(v=>+v),N=y.length;\n    if(N<3) return Array.from({length:n},(_,h)=>{ let m2=lastDt.getMonth()+h+1,y2=lastDt.getFullYear(); while(m2>11){m2-=12;y2++;} return{date_str:MO2[m2]+'/'+y2,Forecast:y[N-1]||0,Lower:0,Upper:(y[N-1]||0)*2}; });\n    let sx=0,sy=0,sxy=0,sx2=0; for(let i=0;i<N;i++){sx+=i;sy+=y[i];sxy+=i*y[i];sx2+=i*i;}\n    const D2=N*sx2-sx*sx,sl=D2?(N*sxy-sx*sy)/D2:0,ic=(sy-sl*sx)/N;\n    const det=y.map((v,i)=>v-(sl*i+ic));\n    const seas=Array.from({length:sp},(_,s)=>{const v=[];for(let j=s;j<N;j+=sp)v.push(det[j]);return v.length?v.reduce((a,b)=>a+b)/v.length:0;});\n    let lv=y[0]; for(let t=1;t<N;t++) lv=0.4*(y[t]-seas[t%sp])+0.6*(lv+sl);\n    const ft=y.map((v,i)=>sl*i+ic+seas[i%sp]);\n    const rmse=Math.sqrt(y.reduce((s,v,i)=>s+(v-ft[i])**2,0)/N);\n    return Array.from({length:n},(_,h)=>{\n      const fc=lv+(h+1)*sl+seas[(N+h)%sp];\n      let m2=lastDt.getMonth()+h+1,y2=lastDt.getFullYear(); while(m2>11){m2-=12;y2++;}\n      return{date_str:MO2[m2]+'/'+y2,Forecast:r6l(fc),Lower:r6l(fc-1.645*rmse*(h+1)**0.5),Upper:r6l(fc+1.645*rmse*(h+1)**0.5)};\n    });\n  }\n\n  // Build dataset from already-aggregated rows (Setor or Grupo)\n  function buildFromAggRows(rows, label){\n    const bm={};\n    for(const r of rows){\n      const dt=parseDt(r['DataRef']); if(!dt||isNaN(dt.getTime())) continue;\n      const dt1=new Date(dt.getFullYear(),dt.getMonth(),1);\n      const ym=dt1.getFullYear()*100+(dt1.getMonth()+1);\n      if(!bm[ym]) bm[ym]={dt:dt1,QSLnM:0,QSLn12M:0,PSL_M:0,PSL12M:0,PRF_M:0,PRF12M:0,PCF_M:0,PCF12M:0};\n      bm[ym].QSLnM  += r6l(r['QSLn-M']); bm[ym].QSLn12M += r6l(r['QSLn12M']);\n      bm[ym].PSL_M  += r6l(r['PSL-M']);  bm[ym].PSL12M  += r6l(r['PSL12M']);\n      bm[ym].PRF_M  += r6l(r['PRF-M']);  bm[ym].PRF12M  += r6l(r['PRF12M']);\n      bm[ym].PCF_M  += r6l(r['PCF-M']);  bm[ym].PCF12M  += r6l(r['PCF12M']);\n    }\n    const yms=Object.keys(bm).map(Number).sort((a,b)=>a-b);\n    const monthly=yms.map(ym=>({date_str:ds3(bm[ym].dt),QSLnM:si(bm[ym].QSLnM),QSLn12M:si(bm[ym].QSLn12M),PSL_M:r6l(bm[ym].PSL_M),PSL12M:r6l(bm[ym].PSL12M),PRF_M:r6l(bm[ym].PRF_M),PRF12M:r6l(bm[ym].PRF12M),PCF_M:r6l(bm[ym].PCF_M),PCF12M:r6l(bm[ym].PCF12M)}));\n    const n=monthly.length,la=monthly[n-1],pr=monthly[n-2]||monthly[n-1],yo=monthly[n-13]||pr;\n    const pc=(a,b)=>b?Math.round((a-b)/Math.abs(b)*10000)/100:0;\n    const kk=key=>({val:la[key],mom:pc(la[key],pr[key]),yoy:pc(la[key],yo[key])});\n    const lastDt=bm[yms[yms.length-1]].dt;\n    const fc=key=>etsFc3(monthly.map(m=>m[key]),6,12,lastDt);\n    return{label,monthly:monthly.slice(-24),all_monthly:monthly,\n      kpis:{last_month:la.date_str,QSLnM:kk('QSLnM'),QSLn12M:kk('QSLn12M'),PSL_M:kk('PSL_M'),PSL12M:kk('PSL12M'),PRF_M:kk('PRF_M'),PRF12M:kk('PRF12M'),PCF_M:kk('PCF_M'),PCF12M:kk('PCF12M')},\n      fc_qslnm:fc('QSLnM'),fc_qsln12m:fc('QSLn12M'),fc_pslm:fc('PSL_M'),fc_psl12m:fc('PSL12M'),fc_prfm:fc('PRF_M'),fc_prf12m:fc('PRF12M'),fc_pcfm:fc('PCF_M'),fc_pcf12m:fc('PCF12M')};\n  }\n\n  // Build per-distribuidora history + classification from dist file\n  function buildDistData(rows){\n    const distH={};\n    // group by Sigla\n    const bySigla={};\n    for(const r of rows){\n      const s=String(r['Sigla']||'').trim(); if(!s) continue;\n      if(!bySigla[s]) bySigla[s]={ge:String(r['GrupoEconomico']||'').trim(), rows:[]};\n      bySigla[s].rows.push(r);\n    }\n    // sort each sigla by date and build monthly array\n    for(const [sigla,obj] of Object.entries(bySigla)){\n      const sorted=obj.rows.slice().sort((a,b)=>{ const da=parseDt(a['DataRef']),db=parseDt(b['DataRef']); return da-db; });\n      distH[sigla]=sorted.map(r=>({\n        date_str:ds3(parseDt(r['DataRef'])),\n        QSLnM:si(r['QSLn-M']),QSLn12M:si(r['QSLn12M']),\n        PSL_M:r6l(r['PSL-M']),PSL12M:r6l(r['PSL12M']),\n        PRF_M:r6l(r['PRF-M']),PRF12M:r6l(r['PRF12M']),\n        PCF_M:r6l(r['PCF-M']),PCF12M:r6l(r['PCF12M']),\n      }));\n    }\n    // classification = last month rows\n    const allDts=rows.map(r=>parseDt(r['DataRef'])).filter(Boolean);\n    const maxDt=new Date(Math.max(...allDts));\n    const cls=[];\n    for(const [sigla,obj] of Object.entries(bySigla)){\n      const lastRow=obj.rows.find(r=>{ const dt=parseDt(r['DataRef']); return dt&&dt.getFullYear()===maxDt.getFullYear()&&dt.getMonth()===maxDt.getMonth(); });\n      if(!lastRow) continue;\n      cls.push({Sigla:sigla,GrupoEconomico:obj.ge,\n        QSLnM:si(lastRow['QSLn-M']),QSLn12M:si(lastRow['QSLn12M']),\n        PSL_M:r6l(lastRow['PSL-M']),PSL12M:r6l(lastRow['PSL12M']),\n        PRF_M:r6l(lastRow['PRF-M']),PRF12M:r6l(lastRow['PRF12M']),\n        PCF_M:r6l(lastRow['PCF-M']),PCF12M:r6l(lastRow['PCF12M']),\n        isEnergisa:ESIG.has(sigla)});\n    }\n    cls.sort((a,b)=>b.QSLnM-a.QSLnM);\n    return{distH, cls, n_distribs:Object.keys(bySigla).length};\n  }\n\n  try{\n    // \u2500\u2500 Read files \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    let rawSetor=null, rawGrupo=null, rawDist=null;\n\n    if(hasSetor){\n      setStat('\u23f3 Lendo Indicador_Setor...','loading');\n      const buf=await readFileAsync(pendingFiles.setor);\n      rawSetor=validRows(parseXlsx(buf));\n    }\n    if(hasGrupo){\n      setStat('\u23f3 Lendo Indicador_por_Grupo...','loading');\n      const buf=await readFileAsync(pendingFiles.grupo);\n      rawGrupo=validRows(parseXlsx(buf));\n    }\n    if(hasDist){\n      setStat('\u23f3 Lendo Distribuidoras...','loading');\n      const buf=await readFileAsync(pendingFiles.dist);\n      rawDist=validRows(parseXlsx(buf));\n    }\n\n    setStat('\u23f3 Calculando indicadores...','loading');\n\n    // \u2500\u2500 Update DS (Setor) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(rawSetor && rawSetor.length){\n      const built=buildFromAggRows(rawSetor,'Setor El\u00e9trico');\n      // Keep existing classification if dist not provided\n      built.classification = rawDist ? [] : DS.classification;\n      built.n_distribs = DS.n_distribs;\n      DS={...DS,...built};\n    }\n\n    // \u2500\u2500 Update DE (Energisa) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(rawGrupo && rawGrupo.length){\n      const energisaRows=rawGrupo.filter(r=>String(r['GrupoEconomico']||'').trim()==='ENERGISA');\n      if(energisaRows.length){\n        const built=buildFromAggRows(energisaRows,'Grupo Energisa');\n        built.classification = rawDist ? DE.classification.filter(r=>r.isEnergisa) : DE.classification;\n        built.n_distribs = DE.n_distribs;\n        DE={...DE,...built};\n      }\n    }\n\n    // \u2500\u2500 Update per-distribuidora history + classification \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    if(rawDist && rawDist.length){\n      const {distH, cls, n_distribs}=buildDistData(rawDist);\n      // Update global DIST_HISTORY in place\n      for(const [k,v] of Object.entries(distH)) DIST_HISTORY[k]=v;\n      DS.classification=cls;\n      DS.n_distribs=n_distribs;\n      DE.classification=cls.filter(r=>r.isEnergisa);\n      DE.n_distribs=DE.classification.length;\n    }\n\n    const ref = DS.kpis.last_month;\n    const parts=[];\n    if(hasSetor) parts.push('Setor');\n    if(hasGrupo) parts.push('Grupo');\n    if(hasDist)  parts.push('Distribuidoras');\n    setStat(`\u2705 Atualizado! (${parts.join(' + ')}) \u00b7 Ref: ${ref}`,'ok');\n    btn.textContent='Atualizar Relat\u00f3rio'; btn.disabled=false;\n    populateFilters(); updateScopeInfo(); renderAll();\n\n  }catch(err){\n    setStat('\u274c '+err.message,'err');\n    btn.textContent='Atualizar Relat\u00f3rio'; btn.disabled=false;\n  }\n}\n\n// INIT\npopulateFilters();\nupdateScopeInfo();\nrenderTab('sumario');\n<\/script>\n</body>\n</html>"
};

var loaded = {};
var current = null;

function switchModule(id) {
  if (id === current) return;
  var btns = document.querySelectorAll('.sb-item[id^="btn-"]');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var oldBadge = document.getElementById('badge-' + current);
  if (oldBadge) oldBadge.remove();
  var btn = document.getElementById('btn-' + id);
  if (btn) {
    btn.classList.add('active');
    var badge = document.createElement('span');
    badge.className = 'sc'; badge.id = 'badge-' + id; badge.textContent = 'ATIVO';
    btn.appendChild(badge);
  }
  var loading = document.getElementById('loading');
  var names = { ligacao: 'Ligação com Obras', faturamento: 'Faturamento de Energia' };
  document.getElementById('ld-text').textContent = 'Carregando ' + (names[id] || id) + '...';
  loading.classList.remove('hidden');
  var frames = document.querySelectorAll('.mframe');
  for (var j = 0; j < frames.length; j++) frames[j].classList.remove('active');
  var frame = document.getElementById('frame-' + id);
  if (!loaded[id]) {
    loaded[id] = true;
    frame.addEventListener('load', function() {
      setTimeout(function() { loading.classList.add('hidden'); }, 150);
    }, { once: true });
    frame.srcdoc = MODULES[id];
  } else {
    setTimeout(function() { loading.classList.add('hidden'); }, 100);
  }
  frame.classList.add('active');
  current = id;
}

switchModule('ligacao');
</script>
