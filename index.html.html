<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Painel Executivo &#8212; Setor El&#233;trico &amp; Grupo Energisa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --turquesa:#009FC2; --verde-lima:#94C873;
  --cinza-escuro:#314D5A; --azul-escuro:#005174;
  --azul-claro:#44C7F4; --bg:#f5f7f9;
  --text:#1a2c38; --text-muted:#7a95a5;
  --sidebar-w:230px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);display:flex;height:100vh;}

#sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:linear-gradient(180deg,#004060 0%,#002d45 100%);
  display:flex; flex-direction:column;
  border-right:3px solid var(--verde-lima);
  z-index:100; overflow-y:auto;
  box-shadow:3px 0 16px rgba(0,0,0,0.25);
}
.sb-logo { padding:22px 18px 18px; border-bottom:1px solid rgba(255,255,255,0.1); }
.sb-badge { display:inline-flex; align-items:center; background:rgba(148,200,115,0.15); border:1px solid rgba(148,200,115,0.3); border-radius:20px; padding:3px 10px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--verde-lima); font-weight:700; margin-bottom:10px; }
.sb-title { font-family:'DM Serif Display',serif; font-size:16px; font-weight:400; color:#fff; line-height:1.25; margin-bottom:4px; }
.sb-sub { font-size:10px; color:rgba(255,255,255,0.4); line-height:1.5; }
.sb-section { padding:18px 18px 6px; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.28); font-weight:700; }
.sb-item { display:flex; align-items:center; gap:11px; padding:11px 18px; cursor:pointer; border:none; background:transparent; width:100%; text-align:left; color:rgba(255,255,255,0.58); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; transition:all .18s; border-left:3px solid transparent; }
.sb-item:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.9); border-left-color:rgba(255,255,255,0.2); }
.sb-item.active { background:rgba(0,159,194,0.18); color:#fff; border-left-color:var(--turquesa); }
.sb-item .si { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
.sb-item .st { flex:1; }
.sb-item .st-name { font-size:12px; font-weight:500; line-height:1.3; }
.sb-item .st-desc { font-size:10px; color:rgba(255,255,255,0.3); margin-top:1px; }
.sb-item.active .st-desc { color:rgba(255,255,255,0.5); }
.sb-item .sc { margin-left:auto; flex-shrink:0; background:rgba(0,159,194,0.25); color:#44C7F4; font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px; letter-spacing:.5px; }
.sb-item.ph { opacity:0.35; cursor:not-allowed; }
.sb-item.ph:hover { background:transparent; color:rgba(255,255,255,0.35); border-left-color:transparent; }
.sb-div { height:1px; background:rgba(255,255,255,0.07); margin:6px 16px; }
.sb-footer { margin-top:auto; padding:14px 18px; border-top:1px solid rgba(255,255,255,0.07); font-size:10px; color:rgba(255,255,255,0.22); line-height:1.6; }

#main { flex:1; overflow:hidden; display:flex; flex-direction:column; position:relative; }
#loading { position:absolute; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; z-index:200; transition:opacity .25s; }
#loading.hidden { opacity:0; pointer-events:none; }
.ld-dots { display:flex; gap:7px; }
.ld-dot { width:9px; height:9px; border-radius:50%; background:var(--turquesa); animation:ldb .7s ease-in-out infinite alternate; }
.ld-dot:nth-child(2){animation-delay:.15s;} .ld-dot:nth-child(3){animation-delay:.3s;}
@keyframes ldb{from{transform:translateY(0);opacity:.3;}to{transform:translateY(-10px);opacity:1;}}
.ld-text{font-size:13px;color:var(--text-muted);font-weight:500;}
.mframe { width:100%; height:100%; border:none; display:none; }
.mframe.active { display:block; }
</style>
</head>
<body>

<nav id="sidebar">
  <div class="sb-logo">
    <div class="sb-badge">&#9889; Energisa</div>
    <div class="sb-title">Painel<br>Executivo</div>
    <div class="sb-sub">Setor El&#233;trico &middot; Grupo Energisa<br>Jan/2023 &ndash; Fev/2026</div>
  </div>
  <div class="sb-section">Relat&#243;rios</div>
  <button class="sb-item active" id="btn-ligacao" onclick="switchModule('ligacao')">
    <span class="si">&#128279;</span>
    <div class="st"><div class="st-name">Liga&#231;&#227;o com Obras</div><div class="st-desc">QLP &middot; QLA &middot; QLS &middot; PLA-M/T</div></div>
    <span class="sc" id="badge-ligacao">ATIVO</span>
  </button>
  <button class="sb-item" id="btn-faturamento" onclick="switchModule('faturamento')">
    <span class="si">&#9889;</span>
    <div class="st"><div class="st-name">Faturamento de Energia</div><div class="st-desc">Fat. &middot; Leitura &middot; Qualidade</div></div>
  </button>
  <div class="sb-div"></div>
  <div class="sb-section">Em breve</div>
  <button class="sb-item ph"><span class="si">&#128202;</span><div class="st"><div class="st-name">Qualidade de Servi&#231;o</div><div class="st-desc">DEC &middot; FEC &middot; Reclama&#231;&#245;es</div></div></button>
  <button class="sb-item ph"><span class="si">&#128295;</span><div class="st"><div class="st-name">Indicadores T&#233;cnicos</div><div class="st-desc">Perdas &middot; TMAE &middot; Efici&#234;ncia</div></div></button>
  <button class="sb-item ph"><span class="si">&#128203;</span><div class="st"><div class="st-name">Conformidade Regulat&#243;ria</div><div class="st-desc">ANEEL &middot; Prazos &middot; Autua&#231;&#245;es</div></div></button>
  <button class="sb-item ph"><span class="si">&#127758;</span><div class="st"><div class="st-name">Vis&#227;o Regional</div><div class="st-desc">Norte &middot; Nordeste &middot; Sul &middot; SE/CO</div></div></button>
  <div class="sb-footer">Painel Executivo v1.0<br>Grupo Energisa &middot; 2026</div>
</nav>

<main id="main">
  <div id="loading">
    <div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div>
    <div class="ld-text" id="ld-text">Carregando relat&#243;rio...</div>
  </div>
  <iframe id="frame-ligacao"     class="mframe active" title="Liga&#231;&#227;o com Obras"></iframe>
  <iframe id="frame-faturamento" class="mframe"        title="Faturamento de Energia"></iframe>
</main>

<script>
var MODULES = {
  ligacao:     "<!DOCTYPE html>\n<html lang=\"pt-BR\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1.0\">\n<title>Relat\u00f3rio Executivo \u2014 Performance de Obras</title>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\"><\/script>\n<style>\n@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');\n:root{\n  --turquesa:#009FC2;--verde-lima:#94C873;--laranja:#F37021;--azul-claro:#44C7F4;\n  --verde-med:#70BF54;--laranja-med:#F99C1C;--azul-sec:#00B6B5;\n  --cinza-escuro:#314D5A;--azul-escuro:#005174;--vermelho:#ED1C24;\n  --bg:#f5f7f9;--surface:#fff;--surface2:#f0f4f7;--border:#d8e4ea;\n  --text:#1a2c38;--text-dim:#314D5A;--text-muted:#7a95a5;\n}\n*{margin:0;padding:0;box-sizing:border-box;}\nbody{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}\n\n/* HEADER */\n.header{background:linear-gradient(135deg,#005174 0%,#009FC2 55%,#00B6B5 100%);position:relative;overflow:hidden;border-bottom:4px solid var(--verde-lima);}\n.hdeco{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}\n.htop{display:flex;justify-content:space-between;align-items:center;gap:24px;padding:20px 48px 24px;position:relative;z-index:2;}\n.hleft{flex-shrink:0;}\n.hcenter{flex:1;padding:0 28px;}\n.hlbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--verde-lima);font-weight:600;margin-bottom:4px;}\n.header h1{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:#fff;line-height:1.2;}\n.header h1 span{color:var(--verde-lima);font-style:italic;}\n.hsub{margin-top:4px;color:rgba(255,255,255,0.8);font-size:12px;}\n.hmeta{text-align:right;flex-shrink:0;}\n.refbadge{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:6px 14px;font-size:12px;color:#fff;font-weight:600;}\n.hgen{margin-top:6px;font-size:11px;color:rgba(255,255,255,0.65);}\n\n/* CONTROL BAR */\n.ctrlbar{background:var(--surface);border-bottom:2px solid var(--border);padding:10px 48px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,0.05);}\n.ctrl-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}\n.scope-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:24px;padding:3px;}\n.sbtn{padding:6px 18px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}\n.sbtn.active{background:var(--turquesa);color:#fff;box-shadow:0 2px 8px rgba(0,159,194,.3);}\n.vdiv{width:1px;background:var(--border);height:28px;}\n\n/* SEGMENTATION SELECTS */\n.seg-group{display:flex;align-items:center;gap:7px;}\n.seg-select{font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;min-width:155px;transition:border-color .15s;}\n.seg-select:focus{outline:none;border-color:var(--turquesa);}\n.seg-select.filtered{border-color:var(--turquesa);color:var(--turquesa);background:rgba(0,159,194,.06);font-weight:700;}\n.seg-clear{font-size:11px;font-weight:700;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}\n.seg-clear:hover{border-color:var(--vermelho);color:var(--vermelho);}\n.seg-badge{font-size:11px;font-weight:600;color:var(--turquesa);background:rgba(0,159,194,.08);border:1px solid rgba(0,159,194,.2);border-radius:20px;padding:3px 10px;display:none;}\n\n/* UPLOAD */\n.upload-area{display:flex;align-items:center;gap:10px;background:rgba(0,159,194,.05);border:1px dashed rgba(0,159,194,.35);border-radius:8px;padding:7px 14px;margin-left:auto;cursor:pointer;transition:all .2s;}\n.upload-area:hover{background:rgba(0,159,194,.1);border-color:var(--turquesa);}\n.upload-area input{display:none;}\n.upload-area label{font-size:11px;font-weight:600;color:var(--turquesa);cursor:pointer;display:flex;align-items:center;gap:7px;}\n.upbtn{background:var(--turquesa);color:#fff;border:none;border-radius:6px;padding:6px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}\n.upbtn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;}\n.upstat{font-size:11px;color:var(--text-muted);}\n.upstat.ok{color:var(--verde-med);font-weight:600;}\n.upstat.loading{color:var(--laranja-med);font-weight:600;}\n.upstat.err{color:var(--vermelho);font-weight:600;}\n\n/* NAV */\n.nav-tabs{background:var(--surface);border-bottom:2px solid var(--border);padding:0 48px;display:flex;overflow-x:auto;}\n.ntab{padding:13px 20px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;margin-bottom:-2px;}\n.ntab:hover{color:var(--turquesa);}\n.ntab.active{color:var(--turquesa);border-bottom-color:var(--turquesa);}\n\n.container{padding:24px 48px;max-width:1400px;}\n.section{display:none;}.section.active{display:block;}\n\n/* KPI */\n.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;}\n.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}\n.kpi-card.c0::before{background:var(--turquesa);}\n.kpi-card.c1::before{background:var(--vermelho);}\n.kpi-card.c2::before{background:var(--laranja-med);}\n.kpi-card.c3::before{background:var(--azul-sec);}\n.kpi-card.c4::before{background:var(--laranja);}\n.klbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;font-weight:600;}\n.kval{font-family:'DM Serif Display',serif;font-size:26px;color:var(--cinza-escuro);line-height:1;margin-bottom:10px;}\n.ktags{display:flex;gap:6px;flex-wrap:wrap;}\n.tag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;}\n.tag-up{background:rgba(237,28,36,.1);color:var(--vermelho);}\n.tag-dn{background:rgba(112,191,84,.12);color:var(--verde-med);}\n.tag-nu{background:rgba(0,159,194,.1);color:var(--turquesa);}\n\n/* CHARTS */\n.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}\n.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:22px;}\n.cc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.cc.full{grid-column:1/-1;}\n.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}\n.ct{font-size:13px;font-weight:600;color:var(--cinza-escuro);margin-bottom:2px;}\n.cs{font-size:11px;color:var(--text-muted);}\n.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(0,159,194,.1);color:var(--turquesa);border:1px solid rgba(0,159,194,.25);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}\ncanvas{max-height:260px;}\n\n/* CMP BANNER */\n.cmpb{background:linear-gradient(135deg,rgba(0,81,116,.05),rgba(0,159,194,.05));border:1px solid rgba(0,159,194,.18);border-radius:10px;padding:16px 22px;margin-bottom:22px;display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}\n.ci{text-align:center;}\n.ci-lbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:8px;}\n.ci-row{display:flex;justify-content:center;align-items:center;gap:10px;}\n.cv{font-family:'DM Serif Display',serif;font-size:17px;line-height:1;}\n.cv-s{color:var(--cinza-escuro);}.cv-e{color:var(--turquesa);}\n.ci-sub{font-size:10px;color:var(--text-muted);margin-top:2px;}\n.ci-div{width:1px;background:var(--border);}\n\n/* TABLE */\n.tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.th{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}\n.tt{font-size:13px;font-weight:700;color:var(--cinza-escuro);}\n.tsub{font-size:11px;color:var(--text-muted);margin-top:2px;}\n.fgrp{display:flex;gap:8px;}\n.fbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;}\n.fbtn:hover,.fbtn.active{border-color:var(--turquesa);color:var(--turquesa);background:rgba(0,159,194,.08);}\ntable{width:100%;border-collapse:collapse;}\nth{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2);font-weight:700;}\ntd{padding:9px 14px;font-size:12px;border-bottom:1px solid #eef2f5;color:var(--text);}\ntr:last-child td{border-bottom:none;}\ntr:hover td{background:rgba(0,159,194,.025);}\n.bdg{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}\n.bg1{background:rgba(112,191,84,.12);color:#3d8e28;border:1px solid rgba(112,191,84,.3);}\n.bg2{background:rgba(249,156,28,.12);color:#c47a00;border:1px solid rgba(249,156,28,.3);}\n.bg3{background:rgba(237,28,36,.1);color:var(--vermelho);border:1px solid rgba(237,28,36,.25);}\n.pbar{display:flex;align-items:center;gap:8px;}\n.pb-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}\n.pb-fill{height:100%;border-radius:3px;}\n\n/* GRUPOS */\n.gcg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}\n.gc{border-radius:10px;padding:18px 20px;border:1px solid;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.gc1{background:rgba(112,191,84,.07);border-color:rgba(112,191,84,.3);}\n.gc2{background:rgba(249,156,28,.07);border-color:rgba(249,156,28,.3);}\n.gc3{background:rgba(237,28,36,.05);border-color:rgba(237,28,36,.2);}\n.gcn{font-family:'DM Serif Display',serif;font-size:40px;line-height:1;margin-bottom:5px;}\n.gc1 .gcn{color:#3d8e28;}.gc2 .gcn{color:#c47a00;}.gc3 .gcn{color:var(--vermelho);}\n.gcl{font-size:12px;font-weight:700;color:var(--cinza-escuro);margin-bottom:3px;}\n.gcd{font-size:11px;color:var(--text-dim);}\n\n/* INSIGHTS */\n.ig{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}\n.ic{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.ic.full{grid-column:1/-1;}\n.ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px;}\n.ir{background:rgba(237,28,36,.08);}.iy{background:rgba(249,156,28,.1);}.ig2{background:rgba(112,191,84,.1);}.ib{background:rgba(0,159,194,.1);}\n.ic h3{font-size:13px;font-weight:700;color:var(--cinza-escuro);margin-bottom:7px;}\n.ic p{font-size:12px;color:var(--text-dim);line-height:1.65;}\n.ic p strong{color:var(--cinza-escuro);}\n.rt{color:var(--vermelho);font-weight:700;}.gt{color:var(--verde-med);font-weight:700;}.yt{color:#c47a00;font-weight:700;}.bt{color:var(--turquesa);font-weight:700;}\n\n.info-box{background:rgba(0,159,194,.05);border:1px solid rgba(0,159,194,.18);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--turquesa);}\n\n::-webkit-scrollbar{width:6px;height:6px;}\n::-webkit-scrollbar-track{background:var(--bg);}\n::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}\n.footer{padding:18px 48px;border-top:2px solid var(--border);display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);background:var(--surface);}\n\n  /* PRINT BUTTON */\n  .print-btn{\n    background:var(--turquesa);color:#fff;border:none;border-radius:6px;\n    padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;\n    font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;\n    transition:background .2s;\n  }\n  .print-btn:hover{background:var(--azul-escuro);}\n\n  /* PRINT STYLES */\n  @media print {\n    @page { size: A4 landscape; margin: 8mm; }\n\n    /* hide UI chrome */\n    .ctrlbar, .nav-tabs, .footer, .print-btn { display: none !important; }\n\n    /* show all sections at once */\n    .section { display: block !important; page-break-inside: avoid; }\n\n    /* header compact */\n    .header { border-bottom: 3px solid #94C873; }\n    .htop { padding: 10px 20px 12px; }\n    .header h1 { font-size: 16px; }\n    .hsub { font-size: 10px; }\n    .hgen { font-size: 9px; }\n\n    /* container */\n    .container { padding: 8px 12px; max-width: 100%; }\n\n    /* grids: force 2 cols max */\n    .chart-grid, .chart-grid-3, .kpi-grid {\n      display: grid !important;\n      grid-template-columns: repeat(2, 1fr) !important;\n      gap: 8px !important;\n      margin-bottom: 10px !important;\n    }\n    .kpi-grid { grid-template-columns: repeat(5, 1fr) !important; }\n\n    /* charts: fixed height */\n    canvas { max-height: 160px !important; height: 160px !important; }\n\n    /* cards */\n    .cc, .kpi-card, .gc, .ic, .tw { box-shadow: none !important; border: 1px solid #d8e4ea !important; }\n\n    /* tables: smaller font */\n    table, th, td { font-size: 9px !important; padding: 4px 6px !important; }\n\n    /* insight cards: 2 col */\n    .ig { grid-template-columns: 1fr 1fr !important; gap: 8px !important; }\n    .ic.full { grid-column: 1 / -1 !important; }\n\n    /* grupo summary */\n    .gcg { grid-template-columns: repeat(3,1fr) !important; gap: 8px !important; }\n    .gcn { font-size: 28px !important; }\n\n    /* section titles */\n    .section::before {\n      content: attr(data-title);\n      display: block;\n      font-family: 'DM Serif Display', serif;\n      font-size: 14px;\n      font-weight: 600;\n      color: #009FC2;\n      border-bottom: 2px solid #d8e4ea;\n      padding-bottom: 4px;\n      margin-bottom: 10px;\n    }\n\n    /* page breaks between sections */\n    #tab-sumario     { page-break-after: always; }\n    #tab-forecast    { page-break-after: always; }\n    #tab-classificacao { page-break-after: always; }\n    #tab-insights    { page-break-after: auto; }\n\n    /* cmp banner hidden always */\n    #cmpBanner { display: none !important; }\n  }\n\n</style>\n</head>\n<body>\n\n<!-- HEADER -->\n<div class=\"header\">\n  <svg class=\"hdeco\" viewBox=\"0 0 1400 160\" preserveAspectRatio=\"xMidYMid slice\" xmlns=\"http://www.w3.org/2000/svg\">\n    <defs><pattern id=\"g2\" width=\"60\" height=\"60\" patternUnits=\"userSpaceOnUse\"><path d=\"M60 0L0 0 0 60\" fill=\"none\" stroke=\"rgba(255,255,255,0.04)\" stroke-width=\"1\"/></pattern></defs>\n    <rect width=\"1400\" height=\"160\" fill=\"url(#g2)\"/>\n    <g transform=\"translate(40,10)\" opacity=\"0.18\" stroke=\"rgba(255,255,255,0.9)\" stroke-width=\"1.5\" fill=\"none\">\n      <line x1=\"30\" y1=\"130\" x2=\"30\" y2=\"0\"/><line x1=\"5\" y1=\"28\" x2=\"55\" y2=\"28\"/><line x1=\"10\" y1=\"52\" x2=\"50\" y2=\"52\"/><line x1=\"15\" y1=\"74\" x2=\"45\" y2=\"74\"/>\n      <line x1=\"30\" y1=\"130\" x2=\"10\" y2=\"150\"/><line x1=\"30\" y1=\"130\" x2=\"50\" y2=\"150\"/><line x1=\"10\" y1=\"150\" x2=\"50\" y2=\"150\"/>\n      <circle cx=\"5\" cy=\"28\" r=\"2.5\" fill=\"rgba(255,255,255,0.6)\"/><circle cx=\"55\" cy=\"28\" r=\"2.5\" fill=\"rgba(255,255,255,0.6)\"/>\n      <circle cx=\"10\" cy=\"52\" \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet scope   = 'setor';\nlet curTab  = 'sumario';\nlet fGrupo  = 'all';\nlet fDistrib= 'all';\nlet charts  = {};\nlet pendingFile = null;\n\n// \u2500\u2500 UTILS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst fmt  = v => Math.round(v).toLocaleString('pt-BR');\nconst fmtP = v => (+v).toFixed(2) + '%';\nconst r2   = v => Math.round(v*100)/100;\nconst MO   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n\nfunction tag(cls, txt){ return `<span class=\"tag ${cls}\">${txt}</span>`; }\nfunction momTag(v,good='down'){\n  const up=v>0; const bad=(good==='down')?up:!up;\n  return tag(bad?'tag-up':'tag-dn',(up?'\u25b2 ':'\u25bc ')+Math.abs(v).toFixed(2)+'% MoM');\n}\nfunction yoyTag(v,good='down'){\n  const up=v>0; const bad=(good==='down')?up:!up;\n  return tag(bad?'tag-up':'tag-dn',(up?'\u25b2 ':'\u25bc ')+Math.abs(v).toFixed(2)+'% YoY');\n}\nfunction kill(id){ if(charts[id]){charts[id].destroy();delete charts[id];} }\n\nfunction getD(){ return scope==='energisa'?DE:DS; }\n\n// \u2500\u2500 FILTER HELPERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction applyFilters(clsArray){\n  return clsArray.filter(r=>{\n    const okG = fGrupo  ==='all' || r.GrupoEconomico===fGrupo;\n    const okD = fDistrib==='all' || r.Sigla===fDistrib;\n    return okG && okD;\n  });\n}\n\n// Filter monthly data by selected distribuidoras\n// Uses the proportional share approach: distribute monthly totals by last-month classification share\nfunction filteredMonthly(D){\n  if(fGrupo==='all' && fDistrib==='all') return D.monthly;\n  const cls = D.classification;\n  const activeCls = applyFilters(cls);\n  if(!activeCls.length) return D.monthly;\n  // Compute share of each active distrib from total classification\n  const totQLP = cls.reduce((s,r)=>s+r.QLP,0)||1;\n  const totQLA = cls.reduce((s,r)=>s+r.QLA,0)||1;\n  const totQLS = cls.reduce((s,r)=>s+r.QLS,0)||1;\n  const sQLP = activeCls.reduce((s,r)=>s+r.QLP,0)/totQLP;\n  const sQLA = activeCls.reduce((s,r)=>s+r.QLA,0)/totQLA;\n  const sQLS = activeCls.reduce((s,r)=>s+r.QLS,0)/totQLS;\n  return D.monthly.map(m=>({\n    date_str: m.date_str,\n    QLP: Math.round(m.QLP*sQLP), QLA: Math.round(m.QLA*sQLA), QLS: Math.round(m.QLS*sQLS),\n    PLA_M: r2(m.QLP*sQLP>0? m.QLA*sQLA/(m.QLP*sQLP)*100 : 0),\n    PLA_T: r2((m.QLP*sQLP+m.QLS*sQLS)>0? (m.QLA*sQLA+m.QLS*sQLS)/(m.QLP*sQLP+m.QLS*sQLS)*100 : 0),\n  }));\n}\n\nfunction filteredFc(D, col){\n  const fcKey = col==='PLA_M'?'fc_pla': col==='QLA'?'fc_qla':'fc_qls';\n  if(fGrupo==='all' && fDistrib==='all') return D[fcKey];\n  const m = filteredMonthly(D);\n  if(!m.length) return D[fcKey];\n  const yArr = m.map(r=>r[col]);\n  return etsForecast(yArr, 6, 12, m[m.length-1].date_str);\n}\n\nfunction kpisFromMonthly(m){\n  if(!m||!m.length) return null;\n  const n=m.length, last=m[n-1], prev=m[n-2]||m[n-1], yoy=m[n-13]||prev;\n  const p=(a,b)=>b?r2((a-b)/b*100):0;\n  return {\n    last_month:last.date_str,\n    QLP:{val:Math.round(last.QLP),mom:p(last.QLP,prev.QLP),yoy:p(last.QLP,yoy.QLP)},\n    QLA:{val:Math.round(last.QLA),mom:p(last.QLA,prev.QLA),yoy:p(last.QLA,yoy.QLA)},\n    QLS:{val:Math.round(last.QLS),mom:p(last.QLS,prev.QLS),yoy:p(last.QLS,yoy.QLS)},\n    PLA_M:{val:last.PLA_M,mom:p(last.PLA_M,prev.PLA_M)},\n    PLA_T:{val:last.PLA_T,mom:p(last.PLA_T,prev.PLA_T)},\n  };\n}\n\n// \u2500\u2500 ETS FORECAST \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction etsForecast(y, n, sp, lastDateStr){\n  const N=y.length;\n  let sx=0,sy=0,sxy=0,sx2=0;\n  for(let i=0;i<N;i++){sx+=i;sy+=y[i];sxy+=i*y[i];sx2+=i*i;}\n  const D2=N*sx2-sx*sx, slope=D2?(N*sxy-sx*sy)/D2:0, intercept=(sy-slope*sx)/N;\n  const detrended=y.map((v,i)=>v-(slope*i+intercept));\n  const seasonal=Array.from({length:sp},(_,s)=>{\n    const v=[];for(let j=s;j<N;j+=sp)v.push(detrended[j]);\n    return v.length?v.reduce((a,b)=>a+b)/v.length:0;\n  });\n  let level=y[0];\n  for(let t=1;t<N;t++) level=0.4*(y[t]-seasonal[t%sp])+0.6*(level+slope);\n  const fitted=y.map((v,i)=>slope*i+intercept+seasonal[i%sp]);\n  const rmse=Math.sqrt(y.reduce((s,v,i)=>s+(v-fitted[i])**2,0)/N);\n  // Parse lastDateStr e.g. \"Feb/2026\"\n  const parts=(lastDateStr||'').split('/');\n  const mo=MO.indexOf(parts[0]??''), yr=parseInt(parts[1]??'2026');\n  return Array.from({length:n},(_,h)=>{\n    const fc=level+(h+1)*slope+seasonal[(N+h)%sp];\n    const lo=fc-1.645*rmse*Math.sqrt(h+1), hi=fc+1.645*rmse*Math.sqrt(h+1);\n    let m2=mo+h+2, y2=yr; while(m2>12){m2-=12;y2++;}\n    return {date_str:MO[m2-1]+'/'+y2, Forecast:r2(fc), Lower:r2(lo), Upper:r2(hi)};\n  });\n}\n\n// \u2500\u2500 SCOPE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction setScope(s, btn){\n  scope=s;\n  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  document.getElementById('refPeriod').textContent='\u26a1 '+getD().kpis.last_month;\n  document.getElementById('scopeInfo').textContent=\n    s==='setor'?'Setor \u00b7 '+DS.n_distribs+' distribuidoras':\n    s==='energisa'?'Grupo Energisa \u00b7 '+DE.n_distribs+' distribuidoras':\n    'Comparativo: Setor vs. Energisa';\n  document.getElementById('footerL').textContent=\n    s==='setor'?'Relat\u00f3rio Executivo \u00b7 Setor El\u00e9trico':\n    s==='energisa'?'Relat\u00f3rio Executivo \u00b7 Grupo Energisa':\n    'Relat\u00f3rio Comparativo \u00b7 Setor vs. Energisa';\n  populateFilters();\n  renderAll();\n}\n\n// \u2500\u2500 TABS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction showTab(tab, el){\n  curTab=tab;\n  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));\n  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));\n  document.getElementById('tab-'+tab).classList.add('active');\n  el.classList.add('active');\n  setTimeout(()=>renderTab(tab), 50);\n}\nfunction renderAll(){ Object.keys(charts).forEach(kill); renderTab(curTab); }\nfunction renderTab(t){\n  if(t==='sumario')       renderSumario();\n  if(t==='forecast')      renderForecast();\n  if(t==='classificacao') renderClassificacao();\n  if(t==='insights')      renderInsights();\n}\n\n// \u2500\u2500 FILTERS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction populateFilters(){\n  const D = getD();\n  const cls = D.classification;\n  const grupos = [...new Set(cls.map(r=>r.GrupoEconomico))].sort();\n  const selGE = document.getElementById('selGE');\n  const selD  = document.getElementById('selD');\n  const prevGE = selGE.value, prevD = selD.value;\n  selGE.innerHTML = '<option value=\"all\">Todos os grupos</option>' +\n    grupos.map(g=>`<option value=\"${g}\"${g===prevGE?' selected':''}>${g}</option>`).join('');\n  // Distribuidoras filtered by grupo if set\n  const activGrupo = selGE.value;\n  const distribs = [...new Set(\n    cls.filter(r=>activGrupo==='all'||r.GrupoEconomico===activGrupo).map(r=>r.Sigla)\n  )].sort();\n  selD.innerHTML = '<option value=\"all\">Todas as distribuidoras</option>' +\n    distribs.map(d=>`<option value=\"${d}\"${d===prevD?' selected':''}>${d}</option>`).join('');\n  fGrupo  = selGE.value;\n  fDistrib= selD.value;\n  updateBadge();\n}\n\nfunction onFilterChange(){\n  const selGE = document.getElementById('selGE');\n  const selD  = document.getElementById('selD');\n  fGrupo = selGE.value;\n  // If grupo changed, rebuild distrib list\n  if(event&&event.target===selGE){\n    const D = getD();\n    const distribs=[...new Set(\n      D.classification.filter(r=>fGrupo==='all'||r.GrupoEconomico===fGrupo).map(r=>r.Sigla)\n    )].sort();\n    selD.innerHTML='<option value=\"all\">Todas as distribuidoras</option>'+\n      distribs.map(d=>`<option value=\"${d}\">${d}</option>`).join('');\n    fDistrib='all';\n  } else {\n    fDistrib=selD.value;\n  }\n  selGE.className='seg-select'+(fGrupo!=='all'?' filtered':'');\n  selD.className ='seg-select'+(fDistrib!=='all'?' filtered':'');\n  updateBadge();\n  renderAll();\n}\n\nfunction clearFilters(){\n  fGrupo='all'; fDistrib='all';\n  document.getElementById('selGE').value='all';\n  document.getElementById('selD').value='all';\n  document.getElementById('selGE').className='seg-select';\n  document.getElementById('selD').className='seg-select';\n  populateFilters();\n  updateBadge();\n  renderAll();\n}\n\nfunction updateBadge(){\n  const b=document.getElementById('segBadge');\n  const parts=[];\n  if(fGrupo!=='all') parts.push('Grupo: '+fGrupo);\n  if(fDistrib!=='all') parts.push('Distribuidora: '+fDistrib);\n  b.textContent=parts.length?'\ud83d\udd0d '+parts.join(' \u00b7 '):'';\n  b.style.display=parts.length?'inline-flex':'none';\n}\n\n// \u2500\u2500 RENDER SUM\u00c1RIO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderSumario(){\n  const isCmp = scope==='comparativo';\n  document.getElementById('cmpBanner').style.display='none';\n  if(isCmp) renderCmpBanner();\n  const D  = getD();\n  const lbl= scope==='energisa'?'Grupo Energisa':'Setor El\u00e9trico';\n  const m24= filteredMonthly(D);\n  const k  = kpisFromMonthly(m24) || D.kpis;\n  const isE= scope==='energisa';\n\n  document.getElementById('kpiGrid').innerHTML=[\n    {l:'QLP \u2014 Liga\u00e7\u00f5es Pendentes', v:fmt(k.QLP.val), t:momTag(k.QLP.mom)+yoyTag(k.QLP.yoy), c:'c0'},\n    {l:'QLA \u2014 Liga\u00e7\u00f5es Atrasadas', v:fmt(k.QLA.val), t:momTag(k.QLA.mom)+yoyTag(k.QLA.yoy), c:'c1'},\n    {l:'QLS \u2014 Liga\u00e7\u00f5es Suspensas', v:fmt(k.QLS.val), t:momTag(k.QLS.mom)+yoyTag(k.QLS.yoy), c:'c2'},\n    {l:'PLA-M \u2014 % Atrasada Mensal', v:fmtP(k.PLA_M.val), t:momTag(k.PLA_M.mom)+(isE?tag('tag-nu','vs Setor: 58,0%'):''), c:'c3'},\n    {l:'PLA-T \u2014 % Atrasada Total',  v:fmtP(k.PLA_T.val), t:momTag(k.PLA_T.mom)+(isE?tag('tag-nu','vs Setor: 70,4%'):''), c:'c4'},\n  ].map(x=>`<div class=\"kpi-card ${x.c}\"><div class=\"klbl\">${x.l}</div><div class=\"kval\">${x.v}</div><div class=\"ktags\">${x.t}</div></div>`).join('');\n\n  document.getElementById('sub-vol').textContent=lbl+' \u00b7 totais mensais';\n  document.getElementById('sub-pla').textContent=lbl+' \u00b7 percentuais';\n  document.getElementById('sub-full').textContent=lbl;\n\n  Chart.defaults.color='#7a95a5'; Chart.defaults.borderColor='#d8e4ea'; Chart.defaults.font.family='DM Sans';\n\n  kill('cVol');\n  if(isCmp){\n    charts['cVol']=new Chart(document.getElementById('cVol'),{\n      type:'line',data:{labels:DS.monthly.map(d=>d.date_str),datasets:[\n        {label:'QLA Setor',   data:DS.monthly.map(d=>d.QLA),borderColor:'#314D5A',borderWidth:2,tension:.3,pointRadius:1.5,borderDash:[5,3]},\n        {label:'QLA Energisa',data:DE.monthly.map(d=>d.QLA),borderColor:'#009FC2',backgroundColor:'rgba(0,159,194,.07)',borderWidth:2.5,tension:.3,pointRadius:2,fill:true},\n      ]},options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{grid:{color:'#d8e4ea'}}}}\n    });\n  } else {\n    charts['cVol']=new Chart(document.getElementById('cVol'),{\n      type:'line',data:{labels:m24.map(d=>d.date_str),datasets:[\n        {label:'QLP',data:m24.map(d=>d.QLP),borderColor:'#009FC2',backgroundColor:'rgba(0,159,194,.06)',tension:.3,borderWidth:2,pointRadius:2},\n        {label:'QLA',data:m24.map(d=>d.QLA),borderColor:'#ED1C24',backgroundColor:'rgba(237,28,36,.06)',tension:.3,borderWidth:2,pointRadius:2},\n        {label:'QLS',data:m24.map(d=>d.QLS),borderColor:'#F99C1C',backgroundColor:'rgba(249,156,28,.06)',tension:.3,borderWidth:2,pointRadius:2},\n      ]},options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{grid:{color:'#d8e4ea'}}}}\n    });\n  }\n\n  kill('cPLA');\n  if(isCmp){\n    charts['cPLA']=new Chart(document.getElementById('cPLA'),{\n      type:'line',data:{labels:DS.comp_pla_sector.map(d=>d.date_str),datasets:[\n        {label:'PLA-M Setor',   data:DS.comp_pla_sector.map(d=>d.PLA_M),  borderColor:'#314D5A',borderWidth:2,tension:.3,pointRadius:2,borderDash:[5,3]},\n        {label:'PLA-M Energisa',data:DE.comp_pla_energisa.map(d=>d.PLA_M),borderColor:'#F37021',backgroundColor:'rgba(243,112,33,.07)',borderWidth:2.5,tension:.3,pointRadius:2,fill:true},\n      ]},options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{grid:{color:'#d8e4ea'},ticks:{callback:v=>v+'%'}}}}\n    });\n  } else {\n    charts['cPLA']=new Chart(document.getElementById('cPLA'),{\n      type:'line',data:{labels:m24.map(d=>d.date_str),datasets:[\n        {label:'PLA-M (%)',data:m24.map(d=>d.PLA_M),borderColor:'#F37021',backgroundColor:'rgba(243,112,33,.08)',tension:.3,borderWidth:2.5,pointRadius:2,fill:true},\n        {label:'PLA-T (%)',data:m24.map(d=>d.PLA_T),borderColor:'#00B6B5',tension:.3,borderWidth:2,pointRadius:2,borderDash:[4,3]},\n      ]},options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},scales:{y:{grid:{color:'#d8e4ea'},ticks:{callback:v=>v+'%'}}}}\n    });\n  }\n\n  kill('cFull');\n  charts['cFull']=new Chart(document.getElementById('cFull'),{\n    type:'line',data:{labels:m24.map(d=>d.date_str),datasets:[\n      {label:'PLA-M (%)',data:m24.map(d=>d.PLA_M),borderColor:'#F37021',tension:.3,borderWidth:2,pointRadius:2,fill:false},\n      {label:'QLA',      data:m24.map(d=>d.QLA),  borderColor:'#009FC2',tension:.3,borderWidth:1.5,pointRadius:2,fill:false,yAxisID:'y2'},\n    ]},\n    options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11}}}},\n      scales:{y:{grid:{color:'#d8e4ea'},ticks:{callback:v=>v+'%'},title:{display:true,text:'PLA-M %',color:'#7a95a5',font:{size:10}}},\n              y2:{position:'right',grid:{display:false},ticks:{callback:v=>v.toLocaleString('pt-BR')},title:{display:true,text:'QLA',color:'#7a95a5',font:{size:10}}}}}\n  });\n}\n\nfunction renderCmpBanner(){\n  const s=DS.kpis,e=DE.kpis;\n  document.getElementById('cs-qlp').textContent=fmt(s.QLP.val); document.getElementById('ce-qlp').textContent=fmt(e.QLP.val);\n  document.getElementById('cs-qla').textContent=fmt(s.QLA.val); document.getElementById('ce-qla').textContent=fmt(e.QLA.val);\n  document.getElementById('cs-qls').textContent=fmt(s.QLS.val); document.getElementById('ce-qls').textContent=fmt(e.QLS.val);\n  document.getElementById('cs-plam').textContent=fmtP(s.PLA_M.val); document.getElementById('ce-plam').textContent=fmtP(e.PLA_M.val);\n  document.getElementById('cs-plat').textContent=fmtP(s.PLA_T.val); document.getElementById('ce-plat').textContent=fmtP(e.PLA_T.val);\n}\n\n// \u2500\u2500 RENDER FORECAST \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderForecast(){\n  const D   = getD();\n  const isCmp = scope==='comparativo';\n  const m24 = filteredMonthly(D);\n  document.getElementById('fc-sub').textContent = isCmp?'Setor El\u00e9trico e Grupo Energisa':D.label;\n\n  function mkFcChart(id, col, color, isPercent){\n    kill(id);\n    const fcData = filteredFc(D, col);\n    const hL = m24.map(d=>d.date_str);\n    const hV = m24.map(d=>d[col]);\n    const fL = fcData.map(d=>d.date_str);\n    const allL=[...hL,...fL];\n    const fcLine=[...Array(hL.length).fill(null),...fcData.map(d=>d.Forecast)];\n    if(hL.length) fcLine[hL.length-1]=hV[hV.length-1];\n    const fcUp=[...Array(hL.length).fill(null),...fcData.map(d=>d.Upper)];\n    const fcLo=[...Array(hL.length).fill(null),...fcData.map(d=>d.Lower)];\n    const datasets=[\n      {label:'Hist\u00f3rico',data:[...hV,...Array(fL.length).fill(null)],borderColor:color,tension:.3,borderWidth:2,pointRadius:1.5,fill:false},\n      {label:'Proje\u00e7\u00e3o', data:fcLine,borderColor:color,borderWidth:2,borderDash:[6,3],tension:.3,pointRadius:3,fill:false},\n      {label:'IC Sup',   data:fcUp, borderColor:color+'44',borderWidth:1,borderDash:[2,2],pointRadius:0,fill:'+1',backgroundColor:color+'18'},\n      {label:'IC Inf',   data:fcLo, borderColor:color+'44',borderWidth:1,borderDash:[2,2],pointRadius:0,fill:false},\n    ];\n    if(isCmp){\n      const m24e=filteredMonthly(DE), hVe=m24e.map(d=>d[col]);\n      const fcE=filteredFc(DE,col);\n      const fcLineE=[...Array(hL.length).fill(null),...fcE.map(d=>d.Forecast)];\n      if(hL.length) fcLineE[hL.length-1]=hVe[hVe.length-1]||0;\n      datasets.unshift({label:'Hist. Energisa',data:[...hVe,...Array(fL.length).fill(null)],borderColor:'#009FC2',tension:.3,borderWidth:2,pointRadius:1.5,fill:false,borderDash:[4,2]});\n      datasets.push({label:'Proj. Energisa',data:fcLineE,borderColor:'#009FC2',borderWidth:2,borderDash:[6,3],tension:.3,pointRadius:3,fill:false});\n    }\n    charts[id]=new Chart(document.getElementById(id),{\n      type:'line',data:{labels:allL,datasets},\n      options:{responsive:true,plugins:{legend:{position:'top',labels:{boxWidth:8,font:{size:10},filter:i=>i.datasetIndex<2}}},\n        scales:{y:{grid:{color:'#d8e4ea'},ticks:{callback:v=>isPercent?v.toFixed(0)+'%':v.toLocaleString('pt-BR',{maximumFractionDigits:0})}}}}\n    });\n  }\n  mkFcChart('fcPLAM','PLA_M','#F37021',true);\n  mkFcChart('fcQLA', 'QLA',  '#ED1C24',false);\n  mkFcChart('fcQLS', 'QLS',  '#F99C1C',false);\n\n  // Table\n  const fcP=filteredFc(D,'PLA_M'), fcQ=filteredFc(D,'QLA'), fcS=filteredFc(D,'QLS');\n  const tb=document.getElementById('fcTbl'); tb.innerHTML='';\n  fcP.forEach((r,i)=>{\n    const q=fcQ[i],s=fcS[i];\n    tb.innerHTML+=`<tr>\n      <td style=\"font-weight:600;color:var(--turquesa)\">${r.date_str}</td>\n      <td>${r.Forecast.toFixed(1)}%</td><td style=\"color:var(--text-muted)\">[${r.Lower.toFixed(1)}%\u2013${r.Upper.toFixed(1)}%]</td>\n      <td>${Math.round(q.Forecast).toLocaleString('pt-BR')}</td><td style=\"color:var(--text-muted)\">[${Math.round(q.Lower).toLocaleString('pt-BR')}\u2013${Math.round(q.Upper).toLocaleString('pt-BR')}]</td>\n      <td>${Math.round(s.Forecast).toLocaleString('pt-BR')}</td><td style=\"color:var(--text-muted)\">[${Math.round(s.Lower).toLocaleString('pt-BR')}\u2013${Math.round(s.Upper).toLocaleString('pt-BR')}]</td>\n    </tr>`;\n  });\n}\n\n// \u2500\u2500 RENDER CLASSIFICA\u00c7\u00c3O \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet clsCurrentData=[];\nfunction renderClassificacao(){\n  const D   = getD();\n  const isCmp = scope==='comparativo';\n  const rawCls = isCmp ? DS.classification : D.classification;\n  const cls = applyFilters(rawCls);\n  const gc  = {1:0,2:0,3:0};\n  cls.forEach(r=>{ if(r.Grupo==='Grupo 1')gc[1]++; else if(r.Grupo==='Grupo 2')gc[2]++; else gc[3]++; });\n  const lbl = isCmp?'Setor El\u00e9trico':D.label;\n\n  document.getElementById('gc1n').textContent=gc[1];\n  document.getElementById('gc2n').textContent=gc[2];\n  document.getElementById('gc3n').textContent=gc[3];\n  document.getElementById('cls-sub1').textContent=lbl;\n  document.getElementById('cls-sub2').textContent='Fev/2026 \u00b7 colorido por grupo de risco';\n  document.getElementById('cls-title').textContent='Classifica\u00e7\u00e3o \u2014 '+lbl+' \u00b7 Fev/2026';\n\n  kill('cGrupos');\n  charts['cGrupos']=new Chart(document.getElementById('cGrupos'),{\n    type:'doughnut',\n    data:{labels:['Grupo 1 \u2014 Adequado','Grupo 2 \u2014 Aten\u00e7\u00e3o','Grupo 3 \u2014 Cr\u00edtico'],\n      datasets:[{data:[gc[1],gc[2],gc[3]],\n        backgroundColor:['rgba(112,191,84,.85)','rgba(249,156,28,.85)','rgba(237,28,36,.85)'],\n        borderColor:['#70BF54','#F99C1C','#ED1C24'],borderWidth:2}]},\n    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}},cutout:'65%'}\n  });\n\n  const sorted=[...cls].sort((a,b)=>b.QLA-a.QLA).slice(0,15);\n  const gcColor=g=>g==='Grupo 3'?'rgba(237,28,36,.82)':g==='Grupo 2'?'rgba(249,156,28,.82)':'rgba(112,191,84,.82)';\n  const gcBorder=g=>g==='Grupo 3'?'#ED1C24':g==='Grupo 2'?'#F99C1C':'#70BF54';\n  kill('cDistrib');\n  charts['cDistrib']=new Chart(document.getElementById('cDistrib'),{\n    type:'bar',\n    data:{labels:sorted.map(d=>d.Sigla),datasets:[{label:'QLA',data:sorted.map(d=>d.QLA),\n      backgroundColor:sorted.map(d=>gcColor(d.Grupo)),\n      borderColor:sorted.map(d=>gcBorder(d.Grupo)),\n      borderWidth:1.5,borderRadius:4}]},\n    options:{indexAxis:'y',responsive:true,\n      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{\n        const r=sorted[c.dataIndex];\n        return ` QLA: ${c.raw.toLocaleString('pt-BR')} \u00b7 ${r.Grupo} \u00b7 PLA-M: ${r.PLA_M.toFixed(1)}%`;\n      }}}},\n      scales:{x:{grid:{color:'#d8e4ea'}}}}\n  });\n\n  clsCurrentData=cls;\n  renderClsTable(cls,'all');\n}\nfunction renderClsTable(data,grupo){\n  const filtered=grupo==='all'?data:data.filter(r=>r.Grupo===grupo);\n  const tb=document.getElementById('clsTbl'); tb.innerHTML='';\n  [...filtered].sort((a,b)=>{\n    const go={'Grupo 3':0,'Grupo 2':1,'Grupo 1':2};\n    const gd=(go[a.Grupo]??3)-(go[b.Grupo]??3);\n    return gd!==0?gd:b.PLA_M-a.PLA_M;\n  }).forEach(r=>{\n    const bc=r.Grupo==='Grupo 3'?'#ED1C24':r.Grupo==='Grupo 2'?'#F99C1C':'#70BF54';\n    const bCls=r.Grupo==='Grupo 3'?'bg3':r.Grupo==='Grupo 2'?'bg2':'bg1';\n    const dot=r.Grupo==='Grupo 3'?'\ud83d\udd34':r.Grupo==='Grupo 2'?'\ud83d\udfe1':'\ud83d\udfe2';\n    const PLANO_SIM=['ENEL SP','ENEL CE','EMR','ERO','EQTL AL','EQTL AP','EQTL CEEE','EQTL GO','EQTL PA','NEO CEB','NEO PE'];\n    const PROC_PUN=['NEO BA','EQTL MA','EQTL PI'];\n    const sitBadge = PLANO_SIM.includes(r.Sigla)\n      ? '<span style=\"font-weight:700;color:#0065A2;background:rgba(0,101,162,.1);border:1px solid rgba(0,101,162,.25);border-radius:12px;padding:2px 9px;font-size:10px\">\ud83d\udccb Plano de Resultados</span>'\n      : PROC_PUN.includes(r.Sigla)\n      ? '<span style=\"font-weight:700;color:#ED1C24;background:rgba(237,28,36,.08);border:1px solid rgba(237,28,36,.25);border-radius:12px;padding:2px 9px;font-size:10px\">\u26a0 Processo Punitivo</span>'\n      : '<span style=\"font-weight:700;color:#5E817E;background:rgba(94,129,126,.08);border:1px solid rgba(94,129,126,.2);border-radius:12px;padding:2px 9px;font-size:10px\">\ud83d\udd0d Em Monitoramento</span>';\n    tb.innerHTML+=`<tr>\n      <td style=\"${r.GrupoEconomico==='ENERGISA'?'font-weight:700;color:#F37021':'font-weight:600'}\">${r.Sigla}</td>\n      <td style=\"color:var(--text-muted)\">${r.GrupoEconomico}</td>\n      <td>${fmt(r.QLP)}</td>\n      <td style=\"font-weight:600;color:${r.QLA>5000?'#c00':r.QLA>150?'#c47a00':'var(--text)'}\">${fmt(r.QLA)}</td>\n      <td>${fmt(r.QLS)}</td>\n      <td><div class=\"pbar\"><div class=\"pb-bg\"><div class=\"pb-fill\" style=\"width:${Math.min(r.PLA_M,100)}%;background:${bc}\"></div></div><span style=\"color:${bc};font-weight:700;min-width:44px;text-align:right\">${r.PLA_M.toFixed(1)}%</span></div></td>\n      <td style=\"color:var(--text-muted)\">${r.PLA_T.toFixed(1)}%</td>\n      <td><span class=\"bdg ${bCls}\">${dot} ${r.Grupo}</span></td>\n      <td style=\"text-align:center\">${sitBadge}</td>\n    </tr>`;\n  });\n}\nfunction filterCls(g,btn){\n  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));\n  btn.classList.add('active');\n  renderClsTable(clsCurrentData,g);\n}\n\n// \u2500\u2500 INSIGHTS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderInsights(){\n  const isE=scope==='energisa', isCmp=scope==='comparativo';\n  let cards=[];\n  if(isE) cards=[\n    {i:'\u2705',c:'ig2',t:'Grupo Energisa Abaixo da M\u00e9dia \u2014 Diferencial de 38pp no PLA-M',b:`O Grupo Energisa encerrou fev/2026 com PLA-M de <span class=\"bt\">20,0%</span>, contra <span class=\"rt\">58,0%</span> do setor \u2014 diferen\u00e7a de <strong>38pp</strong>. Apesar disso, o grupo acumula <span class=\"yt\">+19,7% no YoY do QLA</span> e <span class=\"yt\">+31,8% no QLS</span>, indicando deteriora\u00e7\u00e3o interna.`},\n    {i:'\u26a0\ufe0f',c:'ir',t:'4 de 9 Distribuidoras em Grupo 2 (Aten\u00e7\u00e3o)',b:`ERO (49,96%), EMR (47,65%), EMS (20,58%) e EPB (17,71%) somam <span class=\"rt\">1.891 QLA</span> \u2014 91% do total do grupo. ERO e EMR est\u00e3o na fronteira do Grupo 3.`},\n    {i:'\u2705',c:'ig2',t:'5 Distribuidoras no Grupo 1 \u2014 Base S\u00f3lida',b:`ETO (0%), EAC (0,39%), ESE (3,3%), EMT (4,11%) e ESS comp\u00f5em o Grupo 1. <strong>EMT</strong>, com maior QLP (2.384), mant\u00e9m PLA-M de apenas 4,11% \u2014 refer\u00eancia interna.`},\n    {i:'\ud83d\udcc8',c:'iy',t:'QLS em Alta Preocupante: +31,8% YoY',b:`Com <span class=\"yt\">3.260 liga\u00e7\u00f5es suspensas</span> em fev/2026, o QLS cresceu 31,8% YoY. Obras suspensas sem conclus\u00e3o efetiva contribuem para represamento de demanda.`},\n    {i:'\ud83d\udd2e',c:'ib',t:'Forecast: Retorno ao Grupo 1 at\u00e9 Ago/2026',b:`O modelo projeta queda do PLA-M de 20% para <span class=\"gt\">~10,7%</span> at\u00e9 agosto/2026. Condi\u00e7\u00e3o: ERO e EMR devem ser gerenciadas ativamente.`},\n    {i:'\ud83c\udfaf',c:'ib',t:'Recomenda\u00e7\u00f5es Estrat\u00e9gicas',b:`<strong>1.</strong> Plano de conten\u00e7\u00e3o para ERO e EMR: metas mensais de -5pp at\u00e9 jun/2026.<br><strong>2.</strong> Investigar causas da alta de QLS em EMT, EPB, ETO.<br><strong>3.</strong> Replicar boas pr\u00e1ticas de EMT, EAC e ETO para unidades de maior risco.<br><strong>4.</strong> Aproveitar janela sazonal favor\u00e1vel ago\u2013out para antecipar obras.<br><strong>5.</strong> Meta PLA-M \u2264 10% at\u00e9 ago/2026.`,f:true},\n  ];\n  else if(isCmp) cards=[\n    {i:'\ud83d\udcca',c:'ib',t:'Vis\u00e3o Comparativa: Setor vs. Grupo Energisa',b:`Setor: PLA-M <span class=\"rt\">58,0%</span> \u00b7 Energisa: <span class=\"gt\">20,0%</span> \u2014 diferen\u00e7a de <strong>38pp</strong>. O grupo representa 10,6% do QLP setorial, mas apenas 3,7% do QLA \u2014 efici\u00eancia operacional superior.`},\n    {i:'\ud83d\udea8',c:'ir',t:'Setor em Deteriora\u00e7\u00e3o \u2014 PLA-M no Pico Hist\u00f3rico',b:`PLA-M setorial em <span class=\"rt\">58,0%</span> (+12,1% MoM). EQTL MA (80,7%), EQTL PI (83,3%) e NEO BA (65,2%) concentram ~73% do QLA setorial.`},\n    {i:'\u2705',c:'ig2',t:'Energisa Como Refer\u00eancia Positiva',b:`PLA-M de 20,0% e nenhuma distribuidora no Grupo 3 demonstram desempenho consistentemente superior. Diferencial de 38pp \u00e9 relevante do ponto de vista regulat\u00f3rio.`},\n    {i:'\ud83d\udcc8',c:'iy',t:'Converg\u00eancia de Tend\u00eancias: Ambos em Alta',b:`Setor: QLA +18,5% YoY \u00b7 Energisa: +19,7% YoY. Tend\u00eancia de deteriora\u00e7\u00e3o compartilhada sugere causas estruturais comuns \u2014 demanda reprimida, gargalos de materiais.`},\n    {i:'\ud83d\udd2e',c:'ib',t:'Forecast Comparado',b:`Setor deve recuar de 58% para ~47% at\u00e9 ago/2026. Energisa pode chegar a ~10,7%, retornando ao Grupo 1. Sazonalidade favor\u00e1vel no 2\u00ba semestre beneficia ambos.`},\n    {i:'\ud83c\udfaf',c:'ib',t:'Recomenda\u00e7\u00f5es',b:`<strong>Setor:</strong> interven\u00e7\u00e3o emergencial em EQTL MA, PI e NEO BA. Meta: \u226440% at\u00e9 dez/2026.<br><br><strong>Energisa:</strong> conter ERO e EMR. Meta: PLA-M \u226410% at\u00e9 ago/2026.`,f:true},\n  ];\n  else cards=[\n    {i:'\ud83d\udea8',c:'ir',t:'Deteriora\u00e7\u00e3o Acelerada do PLA-M \u2014 Pico Hist\u00f3rico',b:`PLA-M atingiu <span class=\"rt\">58,0%</span> em fev/2026 (+12,1% MoM). PLA-T em <span class=\"rt\">70,4%</span>. Pior leitura dos \u00faltimos 3 anos.`},\n    {i:'\ud83d\udcc8',c:'iy',t:'QLA em Alta Persistente (+18,5% YoY)',b:`<span class=\"yt\">56.518 liga\u00e7\u00f5es atrasadas</span> em fev/2026. QLP caiu -2% YoY enquanto QLA cresce \u2014 atraso relativo se agrava.`},\n    {i:'\u2705',c:'ig2',t:'QLS em Queda \u2014 Mas Convers\u00e3o Preocupante',b:`QLS recuou <span class=\"gt\">-19,9% YoY</span> e -8,3% MoM. A redu\u00e7\u00e3o est\u00e1 sendo convertida em atraso (QLA), n\u00e3o em conclus\u00e3o efetiva.`},\n    {i:'\u26a0\ufe0f',c:'ir',t:'Concentra\u00e7\u00e3o em 3 Distribuidoras (Grupo 3)',b:`EQTL MA (80,7%), EQTL PI (83,3%) e NEO BA (65,2%) concentram <span class=\"rt\">~73% do QLA setorial</span>.`},\n    {i:'\ud83d\udd2e',c:'iy',t:'Forecast: Melhora Gradual, Insuficiente',b:`Modelo projeta PLA-M recuando para <span class=\"yt\">~47%</span> at\u00e9 ago/2026. N\u00edvel ainda estruturalmente cr\u00edtico sem interven\u00e7\u00f5es.`},\n    {i:'\ud83c\udfaf',c:'ib',t:'Recomenda\u00e7\u00f5es Estrat\u00e9gicas',b:`<strong>1.</strong> Monitoramento quinzenal de EQTL MA, PI e NEO BA com metas audit\u00e1veis.<br><strong>2.</strong> Avaliar capacidade de EQTL GO, PA, AL, ENEL SP, EMR e ERO (risco Grupo 3).<br><strong>3.</strong> Antecipar obras na janela favor\u00e1vel ago\u2013out.<br><strong>4.</strong> Meta PLA-M \u2264 40% at\u00e9 dez/2026.`,f:true},\n  ];\n  document.getElementById('insContainer').innerHTML=cards.map(c=>\n    `<div class=\"ic${c.f?' full':''}\"><div class=\"ico ${c.c}\">${c.i}</div><h3>${c.t}</h3><p>${c.b}</p></div>`\n  ).join('');\n}\n\n// \u2500\u2500 FILE UPLOAD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction onFileSelected(input){\n  pendingFile=input.files[0];\n  if(!pendingFile) return;\n  document.getElementById('fileLabel').textContent=pendingFile.name;\n  document.getElementById('upBtn').disabled=false;\n  document.getElementById('upStat').textContent='Pronto para atualizar.';\n  document.getElementById('upStat').className='upstat';\n}\nfunction setStat(msg,cls){ const el=document.getElementById('upStat'); el.textContent=msg; el.className='upstat'+(cls?' '+cls:''); }\n\nfunction processFile(){\n  if(!pendingFile) return;\n  const btn=document.getElementById('upBtn');\n  btn.disabled=true; btn.textContent='Processando...';\n  setStat('\u23f3 Lendo arquivo...','loading');\n  const reader=new FileReader();\n  reader.onerror=()=>{ setStat('\u274c Erro ao ler arquivo.','err'); btn.disabled=false; btn.textContent='Atualizar'; };\n  reader.onload=function(e){\n    try{\n      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});\n      const ws=wb.Sheets[wb.SheetNames[0]];\n      const raw=XLSX.utils.sheet_to_json(ws,{raw:true,defval:null});\n      if(!raw.length) throw new Error('Planilha vazia.');\n      const REQ=['DataRef','GrupoEconomico','Sigla','QLP','QLA','QLS'];\n      const missing=REQ.filter(c=>!(c in raw[0]));\n      if(missing.length) throw new Error('Colunas ausentes: '+missing.join(', '));\n\n      setStat('\u23f3 Processando dados...','loading');\n      const rows=[]; let skip=0;\n      for(const r of raw){\n        let dt=null;\n        const rd=r['DataRef'];\n        if(rd instanceof Date&&!isNaN(rd)) dt=rd;\n        else if(typeof rd==='number') dt=new Date(Math.round((rd-25569)*86400000));\n        else if(typeof rd==='string'&&rd.trim()){\n          dt=new Date(rd.trim());\n          if(isNaN(dt)){\n            const p=rd.trim().split(/[\\/\\-]/);\n            if(p.length===3) dt=p[0].length===4?new Date(+p[0],+p[1]-1,+p[2]):new Date(+p[2],+p[1]-1,+p[0]);\n          }\n        }\n        if(!dt||isNaN(dt.getTime())){skip++;continue;}\n        dt=new Date(dt.getFullYear(),dt.getMonth(),1);\n        rows.push({dt,ym:dt.getFullYear()*100+(dt.getMonth()+1),\n          GrupoEconomico:String(r.GrupoEconomico||'').trim(),\n          Sigla:String(r.Sigla||'').trim(),\n          QLP:parseFloat(r.QLP)||0,QLA:parseFloat(r.QLA)||0,QLS:parseFloat(r.QLS)||0});\n      }\n      if(!rows.length) throw new Error('Nenhuma linha com data v\u00e1lida.');\n\n      const newDS=buildDataset(rows,'Setor El\u00e9trico');\n      const newDE=buildDataset(rows.filter(r=>r.GrupoEconomico==='ENERGISA'),'Grupo Energisa');\n      const lastYm=Math.max(...rows.map(r=>r.ym));\n      newDS.classification=classifyRows(rows.filter(r=>r.ym===lastYm));\n      newDE.classification=classifyRows(rows.filter(r=>r.ym===lastYm&&r.GrupoEconomico==='ENERGISA'));\n      newDS.grupo_counts=countG(newDS.classification);\n      newDE.grupo_counts=countG(newDE.classification);\n      const cs=compPla(rows), ce=compPla(rows.filter(r=>r.GrupoEconomico==='ENERGISA'));\n      newDS.comp_pla_sector=cs; newDS.comp_pla_energisa=ce;\n      newDE.comp_pla_sector=cs; newDE.comp_pla_energisa=ce;\n      DS=newDS; DE=newDE;\n\n      setStat(`\u2705 Atualizado! ${rows.length} registros \u00b7 Ref: ${DS.kpis.last_month}`+(skip?` (${skip} ignorados)`:'' ),'ok');\n      btn.textContent='Atualizar'; btn.disabled=false;\n      populateFilters();\n      renderAll();\n    }catch(err){\n      setStat('\u274c '+err.message,'err');\n      btn.textContent='Atualizar'; btn.disabled=false;\n    }\n  };\n  reader.readAsArrayBuffer(pendingFile);\n}\n\nfunction buildDataset(rows,label){\n  const bm={};\n  for(const r of rows){\n    if(!bm[r.ym]) bm[r.ym]={QLP:0,QLA:0,QLS:0};\n    bm[r.ym].QLP+=r.QLP; bm[r.ym].QLA+=r.QLA; bm[r.ym].QLS+=r.QLS;\n  }\n  const yms=Object.keys(bm).map(Number).sort((a,b)=>a-b);\n  const monthly=yms.map(ym=>{\n    const d=bm[ym], y=Math.floor(ym/100), m=ym%100;\n    const PLA_M=d.QLP>0?r2(d.QLA/d.QLP*100):0;\n    const PLA_T=(d.QLP+d.QLS)>0?r2((d.QLA+d.QLS)/(d.QLP+d.QLS)*100):0;\n    return{date_str:MO[m-1]+'/'+y,ym,QLP:d.QLP,QLA:d.QLA,QLS:d.QLS,PLA_M,PLA_T};\n  });\n  const n=monthly.length,last=monthly[n-1],prev=monthly[n-2]||monthly[n-1],yoy=monthly[n-13]||prev;\n  const p=(a,b)=>b?r2((a-b)/b*100):0;\n  const kpis={last_month:last.date_str,\n    QLP:{val:Math.round(last.QLP),mom:p(last.QLP,prev.QLP),yoy:p(last.QLP,yoy.QLP)},\n    QLA:{val:Math.round(last.QLA),mom:p(last.QLA,prev.QLA),yoy:p(last.QLA,yoy.QLA)},\n    QLS:{val:Math.round(last.QLS),mom:p(last.QLS,prev.QLS),yoy:p(last.QLS,yoy.QLS)},\n    PLA_M:{val:last.PLA_M,mom:p(last.PLA_M,prev.PLA_M)},\n    PLA_T:{val:last.PLA_T,mom:p(last.PLA_T,prev.PLA_T)},\n  };\n  const m24=monthly.slice(-24).map(({date_str,QLP,QLA,QLS,PLA_M,PLA_T})=>({date_str,QLP,QLA,QLS,PLA_M,PLA_T}));\n  const all_monthly=monthly.map(({date_str,QLA,PLA_M})=>({date_str,QLA,PLA_M}));\n  const fc={};\n  for(const col of['PLA_M','QLA','QLS'])\n    fc[col]=etsForecast(monthly.map(d=>d[col]),6,12,last.date_str);\n  return{label,n_distribs:new Set(rows.map(r=>r.Sigla)).size,kpis,monthly:m24,all_monthly,\n    fc_pla:fc['PLA_M'],fc_qla:fc['QLA'],fc_qls:fc['QLS']};\n}\nfunction classifyRows(rows){\n  const bd={};\n  for(const r of rows){\n    if(!bd[r.Sigla]) bd[r.Sigla]={Sigla:r.Sigla,GrupoEconomico:r.GrupoEconomico,QLP:0,QLA:0,QLS:0};\n    bd[r.Sigla].QLP+=r.QLP; bd[r.Sigla].QLA+=r.QLA; bd[r.Sigla].QLS+=r.QLS;\n  }\n  return Object.values(bd).map(r=>{\n    const PLA_M=r.QLP>0?r2(r.QLA/r.QLP*100):0;\n    const PLA_T=(r.QLP+r.QLS)>0?r2((r.QLA+r.QLS)/(r.QLP+r.QLS)*100):0;\n    const Grupo=PLA_M>50&&r.QLA>5000?'Grupo 3':PLA_M>10&&r.QLA>150?'Grupo 2':'Grupo 1';\n    return{...r,PLA_M,PLA_T,Grupo};\n  });\n}\nfunction countG(cls){const c={};cls.forEach(r=>{c[r.Grupo]=(c[r.Grupo]||0)+1;});return c;}\nfunction compPla(rows){\n  const bm={};\n  rows.forEach(r=>{if(!bm[r.ym])bm[r.ym]={QLA:0,QLP:0};bm[r.ym].QLA+=r.QLA;bm[r.ym].QLP+=r.QLP;});\n  return Object.keys(bm).map(Number).sort((a,b)=>a-b).slice(-24).map(ym=>{\n    const d=bm[ym],y=Math.floor(ym/100),m=ym%100;\n    return{date_str:MO[m-1]+'/'+y,PLA_M:d.QLP>0?r2(d.QLA/d.QLP*100):0};\n  });\n}\n\n\n// \u2500\u2500 PRINT / PDF \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction printReport() {\n  // Show all sections temporarily for print\n  const sections = document.querySelectorAll('.section');\n  const tabs     = document.querySelectorAll('.ntab');\n  sections.forEach(s => s.classList.add('active'));\n  tabs.forEach(t => t.classList.remove('active'));\n\n  // Small delay so charts render before print dialog\n  setTimeout(() => {\n    window.print();\n    // Restore: show only current tab\n    setTimeout(() => {\n      sections.forEach(s => s.classList.remove('active'));\n      document.getElementById('tab-' + curTab).classList.add('active');\n      document.querySelectorAll('.ntab').forEach(t => {\n        if (t.textContent.toLowerCase().includes(\n          curTab === 'sumario' ? 'sum\u00e1rio' :\n          curTab === 'forecast' ? 'forecast' :\n          curTab === 'classificacao' ? 'classif' : 'insight'\n        )) t.classList.add('active');\n      });\n    }, 500);\n  }, 300);\n}\n\n// \u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\npopulateFilters();\nrenderTab('sumario');\n<\/script>\n</body>\n</html>",
  faturamento: "<!DOCTYPE html>\n<html lang=\"pt-BR\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1.0\">\n<title>Relat\u00f3rio Executivo \u2014 Faturamento de Energia</title>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js\"><\/script>\n<style>\n@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');\n:root{\n  --turquesa:#009FC2;--verde-lima:#94C873;--laranja:#F37021;--azul-claro:#44C7F4;\n  --verde-med:#70BF54;--laranja-med:#F99C1C;--azul-sec:#00B6B5;\n  --cinza-escuro:#314D5A;--azul-escuro:#005174;--vermelho:#ED1C24;\n  --energisa-color:#C2CD23;--setor-color:#3984A3;\n  --bg:#f5f7f9;--surface:#fff;--surface2:#f0f4f7;--border:#d8e4ea;\n  --text:#1a2c38;--text-dim:#314D5A;--text-muted:#7a95a5;\n}\n*{margin:0;padding:0;box-sizing:border-box;}\nbody{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}\n.header{background:linear-gradient(135deg,#005174 0%,#009FC2 55%,#00B6B5 100%);position:relative;overflow:hidden;border-bottom:4px solid var(--verde-lima);}\n.hdeco{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}\n.htop{display:flex;justify-content:space-between;align-items:center;gap:24px;padding:20px 48px 24px;position:relative;z-index:2;}\n.hleft{flex-shrink:0;display:flex;align-items:center;}\n.hcenter{flex:1;padding:0 28px;}\n.hlbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--verde-lima);font-weight:600;margin-bottom:4px;}\n.header h1{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:#fff;line-height:1.2;}\n.header h1 span{color:var(--verde-lima);font-style:italic;}\n.hsub{margin-top:4px;color:rgba(255,255,255,0.8);font-size:12px;}\n.hmeta{text-align:right;flex-shrink:0;}\n.refbadge{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:6px 14px;font-size:12px;color:#fff;font-weight:600;}\n.hgen{margin-top:6px;font-size:11px;color:rgba(255,255,255,0.65);}\n.ctrlbar{background:var(--surface);border-bottom:2px solid var(--border);padding:10px 48px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,0.05);}\n.ctrl-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}\n.scope-toggle{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:24px;padding:3px;}\n.sbtn{padding:6px 18px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}\n.sbtn.active{background:var(--turquesa);color:#fff;box-shadow:0 2px 8px rgba(0,159,194,.3);}\n.vdiv{width:1px;background:var(--border);height:28px;}\n.seg-group{display:flex;align-items:center;gap:7px;}\n.seg-select{font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;min-width:155px;transition:border-color .15s;}\n.seg-select:focus{outline:none;border-color:var(--turquesa);}\n.seg-select.filtered{border-color:var(--turquesa);color:var(--turquesa);background:rgba(0,159,194,.06);font-weight:700;}\n.seg-clear{font-size:11px;font-weight:700;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}\n.seg-clear:hover{border-color:var(--vermelho);color:var(--vermelho);}\n.seg-badge{font-size:11px;font-weight:600;color:var(--turquesa);background:rgba(0,159,194,.08);border:1px solid rgba(0,159,194,.2);border-radius:20px;padding:3px 10px;display:none;}\n.upload-area{display:flex;align-items:center;gap:10px;background:rgba(0,159,194,.05);border:1px dashed rgba(0,159,194,.35);border-radius:8px;padding:7px 14px;margin-left:auto;cursor:pointer;transition:all .2s;}\n.upload-area:hover{background:rgba(0,159,194,.1);border-color:var(--turquesa);}\n.upload-area input{display:none;}\n.upload-area label{font-size:11px;font-weight:600;color:var(--turquesa);cursor:pointer;display:flex;align-items:center;gap:7px;}\n.upbtn{background:var(--turquesa);color:#fff;border:none;border-radius:6px;padding:6px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}\n.upbtn:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed;}\n.upstat{font-size:11px;color:var(--text-muted);}\n.upstat.ok{color:var(--verde-med);font-weight:600;}\n.upstat.loading{color:var(--laranja-med);font-weight:600;}\n.upstat.err{color:var(--vermelho);font-weight:600;}\n.nav-tabs{background:var(--surface);border-bottom:2px solid var(--border);padding:0 48px;display:flex;overflow-x:auto;}\n.ntab{padding:13px 20px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;margin-bottom:-2px;}\n.ntab:hover{color:var(--turquesa);}\n.ntab.active{color:var(--turquesa);border-bottom-color:var(--turquesa);}\n.container{padding:24px 48px;max-width:1400px;}\n.section{display:none;}.section.active{display:block;}\n.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}\n.kpi-section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:8px;}\n.kpi-section-label .pill{background:var(--turquesa);color:#fff;border-radius:20px;padding:2px 10px;font-size:10px;}\n.kpi-section-label .pill2{background:var(--laranja);color:#fff;border-radius:20px;padding:2px 10px;font-size:10px;}\n.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}\n.kpi-card.c0::before{background:var(--turquesa);}\n.kpi-card.c1::before{background:var(--vermelho);}\n.kpi-card.c2::before{background:var(--laranja-med);}\n.kpi-card.c3::before{background:var(--azul-sec);}\n.klbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;font-weight:600;}\n.kval{font-family:'DM Serif Display',serif;font-size:24px;color:var(--cinza-escuro);line-height:1;margin-bottom:10px;}\n.ktags{display:flex;gap:6px;flex-wrap:wrap;}\n.tag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:3px;}\n.tag-up{background:rgba(237,28,36,.1);color:var(--vermelho);}\n.tag-dn{background:rgba(112,191,84,.12);color:var(--verde-med);}\n.tag-nu{background:rgba(0,159,194,.1);color:var(--turquesa);}\n.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}\n.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:22px;}\n.chart-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:22px;}\n.cc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.cc.full{grid-column:1/-1;}\n.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}\n.ct{font-size:13px;font-weight:600;color:var(--cinza-escuro);margin-bottom:2px;}\n.cs{font-size:11px;color:var(--text-muted);}\n.badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(0,159,194,.1);color:var(--turquesa);border:1px solid rgba(0,159,194,.25);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}\n.badge-o{background:rgba(243,112,33,.1);color:var(--laranja);border-color:rgba(243,112,33,.25);}\ncanvas{max-height:240px;}\n.tw{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.th{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2);}\n.tt{font-size:13px;font-weight:700;color:var(--cinza-escuro);}\n.tsub{font-size:11px;color:var(--text-muted);margin-top:2px;}\ntable{width:100%;border-collapse:collapse;}\nth{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);padding:10px 14px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2);font-weight:700;}\ntd{padding:9px 14px;font-size:12px;border-bottom:1px solid #eef2f5;color:var(--text);}\ntr:last-child td{border-bottom:none;}\ntr:hover td{background:rgba(0,159,194,.025);}\n.pbar{display:flex;align-items:center;gap:8px;}\n.pb-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}\n.pb-fill{height:100%;border-radius:3px;}\n.ig{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}\n.ic{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.04);}\n.ic.full{grid-column:1/-1;}\n.ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px;}\n.ir{background:rgba(237,28,36,.08);}.iy{background:rgba(249,156,28,.1);}.ig2{background:rgba(112,191,84,.1);}.ib{background:rgba(0,159,194,.1);}\n.ic h3{font-size:13px;font-weight:700;color:var(--cinza-escuro);margin-bottom:7px;}\n.ic p{font-size:12px;color:var(--text-dim);line-height:1.65;}\n.ic p strong{color:var(--cinza-escuro);}\n.rt{color:var(--vermelho);font-weight:700;}.gt{color:var(--verde-med);font-weight:700;}.yt{color:#c47a00;font-weight:700;}.bt{color:var(--turquesa);font-weight:700;}\n.info-box{background:rgba(0,159,194,.05);border:1px solid rgba(0,159,194,.18);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--turquesa);}\n.section-header{font-family:'DM Serif Display',serif;font-size:16px;color:var(--cinza-escuro);margin-bottom:16px;display:flex;align-items:center;gap:10px;}\n.section-header span{font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--turquesa);background:rgba(0,159,194,.1);border:1px solid rgba(0,159,194,.25);border-radius:20px;padding:3px 12px;}\n/* legend dots */\n.leg-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}\n::-webkit-scrollbar{width:6px;height:6px;}\n::-webkit-scrollbar-track{background:var(--bg);}\n::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}\n.footer{padding:18px 48px;border-top:2px solid var(--border);display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);background:var(--surface);}\n.print-btn{background:var(--turquesa);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;transition:background .2s;}\n.print-btn:hover{background:var(--azul-escuro);}\n@media print {\n  @page{size:A4 landscape;margin:8mm;}\n  .ctrlbar,.nav-tabs,.footer,.print-btn{display:none!important;}\n  .section{display:block!important;page-break-inside:avoid;}\n  .header{border-bottom:3px solid #94C873;}\n  .container{padding:8px 12px;max-width:100%;}\n  .chart-grid,.chart-grid-3,.chart-grid-4,.kpi-grid{display:grid!important;grid-template-columns:repeat(2,1fr)!important;gap:8px!important;margin-bottom:10px!important;}\n  canvas{max-height:150px!important;height:150px!important;}\n  .cc,.kpi-card,.ic,.tw{box-shadow:none!important;border:1px solid #d8e4ea!impo
